<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 — Turnir Kuzatuvi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: dark;
  --bg: #081f11; --bg2: #0d2e18; --bg3: #123522;
  --gold: #f0c040; --gold2: #c9a227;
  --lime: #27ae60; --lime2: #2ecc71; --red: #e74c3c;
  --text: #ede8dc; --text2: #b8c4bc; --muted: #6b7f72;
  --card: rgba(255,255,255,0.035); --card2: rgba(255,255,255,0.03);
  --border: rgba(240,192,64,0.13); --border2: rgba(255,255,255,0.07);
  --headbg: rgba(8,31,17,0.75); --pillbg: rgba(0,0,0,0.25);
  --hov: rgba(255,255,255,0.06);
  --goldbg: rgba(240,192,64,0.1); --goldbg2: rgba(240,192,64,0.06);
  --goldbrd: rgba(240,192,64,0.18); --goldbrd2: rgba(240,192,64,0.35);
  --okbg: rgba(39,174,96,0.14); --livebg: rgba(231,76,60,0.18); --soonbg: rgba(240,192,64,0.09);
  --rowline: rgba(255,255,255,0.03); --rowhov: rgba(255,255,255,0.025);
  --chipbg: rgba(255,255,255,0.07);
  --skel1: rgba(255,255,255,0.03); --skel2: rgba(255,255,255,0.07);
  --p1tx: #081f11; --p2bg: rgba(240,192,64,0.22); --p3bg: rgba(39,174,96,0.18); --p4bg: rgba(255,255,255,0.07);
  --silver: #aaa; --bronze: #cd7f32;
  --glow1: rgba(39,174,96,0.07); --glow2: rgba(240,192,64,0.04); --gridline: rgba(255,255,255,0.008);
  --shadow: none;
  --overlay: rgba(0,0,0,0.72);
}
[data-theme="light"] {
  color-scheme: light;
  --bg: #f3efe2; --bg2: #fdfbf4; --bg3: #e7f1e8;
  --gold: #9c7a0e; --gold2: #7d6209;
  --lime: #1e8a4c; --lime2: #157a43; --red: #c0392b;
  --text: #1f2d24; --text2: #46584c; --muted: #6b7b6e;
  --card: #fffdf7; --card2: rgba(0,0,0,0.035);
  --border: rgba(154,122,10,0.28); --border2: rgba(0,0,0,0.09);
  --headbg: rgba(253,251,244,0.8); --pillbg: rgba(0,0,0,0.045);
  --hov: rgba(0,0,0,0.05);
  --goldbg: rgba(156,124,14,0.12); --goldbg2: rgba(156,124,14,0.07);
  --goldbrd: rgba(156,124,14,0.3); --goldbrd2: rgba(156,124,14,0.5);
  --okbg: rgba(30,138,76,0.13); --livebg: rgba(192,57,43,0.12); --soonbg: rgba(156,124,14,0.12);
  --rowline: rgba(0,0,0,0.05); --rowhov: rgba(0,0,0,0.03);
  --chipbg: rgba(0,0,0,0.06);
  --skel1: rgba(0,0,0,0.05); --skel2: rgba(0,0,0,0.1);
  --p1tx: #fffdf7; --p2bg: rgba(156,124,14,0.2); --p3bg: rgba(30,138,76,0.16); --p4bg: rgba(0,0,0,0.06);
  --silver: #8a8a8a; --bronze: #a4682a;
  --glow1: rgba(39,174,96,0.09); --glow2: rgba(212,175,55,0.12); --gridline: rgba(0,0,0,0.015);
  --shadow: 0 1px 3px rgba(20,40,25,0.08);
  --overlay: rgba(20,30,22,0.45);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; transition: background-color .25s ease, color .25s ease; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 100% 60% at 50% -5%, var(--glow1) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 90% 100%, var(--glow2) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 80px, var(--gridline) 80px, var(--gridline) 81px),
    repeating-linear-gradient(90deg, transparent, transparent 80px, var(--gridline) 80px, var(--gridline) 81px);
}
button:focus-visible, .fcard:focus-visible, a:focus-visible { outline: 2px solid var(--gold2); outline-offset: 2px; }
header {
  position: sticky; top: 0; z-index: 10;
  padding: 0 1.75rem;
  background: var(--headbg);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  height: 58px; gap: 1rem;
  transition: background-color .25s ease;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem; letter-spacing: .14em; color: var(--gold); white-space: nowrap; display: flex; align-items: center; gap: .5rem; }
.logo em { color: var(--text); opacity: .5; font-size: .8rem; font-style: normal; letter-spacing: .06em; }
nav { display: flex; gap: .15rem; flex-wrap: wrap; }
nav button { background: none; border: 1px solid transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: .75rem; font-weight: 500; padding: .4rem .85rem; border-radius: 6px; cursor: pointer; transition: all .18s; text-transform: uppercase; letter-spacing: .05em; }
nav button:hover { color: var(--text); background: var(--hov); }
nav button.act { color: var(--gold); background: var(--goldbg); border-color: var(--goldbrd); }
.hright { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
.apipill { display: flex; align-items: center; gap: .38rem; font-size: .66rem; color: var(--muted); white-space: nowrap; background: var(--pillbg); padding: .28rem .65rem; border-radius: 16px; border: 1px solid var(--border2); font-family: 'DM Mono'; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .3s; flex-shrink: 0; }
.dot.ok { background: var(--lime2); }
.dot.err { background: var(--red); }
.dot.spin { background: var(--gold); animation: blink 1s infinite; }
.tbtn { background: var(--pillbg); border: 1px solid var(--border2); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: .9rem; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all .18s; flex-shrink: 0; }
.tbtn:hover { border-color: var(--goldbrd2); transform: scale(1.08); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
main { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 1.5rem 1.75rem; }
.page { display: none; }
.page.act { display: block; animation: fadein .25s ease; }
@keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.sec { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .1em; color: var(--gold); margin-bottom: 1.25rem; display: flex; align-items: center; gap: .75rem; }
.sec::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold2), transparent); opacity: .3; }
.skel { background: linear-gradient(90deg, var(--skel1) 25%, var(--skel2) 50%, var(--skel1) 75%); background-size: 200% 100%; animation: shim 1.6s infinite; border-radius: 8px; }
@keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* STATS */
.statbar { display: grid; grid-template-columns: repeat(4,1fr); gap: .85rem; margin-bottom: 1.75rem; }
.sc { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.3rem; position: relative; overflow: hidden; box-shadow: var(--shadow); }
.sc::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold), transparent); }
.sl { font-size: .64rem; text-transform: uppercase; letter-spacing: .13em; color: var(--muted); margin-bottom: .3rem; }
.sv { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--gold); line-height: 1; }
.ss { font-size: .68rem; color: var(--muted); margin-top: .2rem; }

/* FIXTURE CARD */
.mlist { display: flex; flex-direction: column; gap: .5rem; }
.date-group { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); padding: .6rem 0 .35rem; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid var(--border2); margin-bottom: .4rem; margin-top: .75rem; display: flex; align-items: center; gap: .45rem; }
.date-group:first-child { margin-top: 0; }
.today-badge { background: var(--okbg); color: var(--lime2); padding: .12rem .45rem; border-radius: 3px; font-size: .62rem; font-weight: 700; letter-spacing: .08em; }
.fcard { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: grid; grid-template-columns: 130px 1fr auto 1fr 110px; align-items: stretch; transition: border-color .18s, transform .18s; cursor: pointer; box-shadow: var(--shadow); }
.fcard:hover { border-color: var(--goldbrd2); transform: translateY(-1px); }
.fmeta { padding: .65rem .85rem; border-right: 1px solid var(--border2); display: flex; flex-direction: column; justify-content: center; gap: .18rem; }
.fdate { font-size: .68rem; color: var(--gold2); font-family: 'DM Mono'; font-weight: 500; }
.ftime { font-size: .85rem; color: var(--text); font-family: 'Bebas Neue'; letter-spacing: .06em; }
.fvenue { font-size: .58rem; color: var(--muted); line-height: 1.3; margin-top: .1rem; }
.fhome { display: flex; align-items: center; justify-content: flex-end; gap: .5rem; padding: .65rem .8rem; font-weight: 600; font-size: .88rem; text-align: right; }
.fscore { display: flex; align-items: center; justify-content: center; padding: 0 .6rem; min-width: 80px; font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem; letter-spacing: .06em; color: var(--gold); white-space: nowrap; }
.fscore.pend { font-family: 'DM Sans'; font-size: .72rem; color: var(--text2); letter-spacing: 0; text-align: center; line-height: 1.5; flex-direction: column; gap: 0; }
.fscore.pend .pend-date { font-size: .68rem; color: var(--muted); font-family: 'DM Mono'; }
.fscore.pend .pend-time { font-size: 1rem; color: var(--gold); font-family: 'Bebas Neue'; letter-spacing: .06em; }
.faway { display: flex; align-items: center; justify-content: flex-start; gap: .5rem; padding: .65rem .8rem; font-weight: 600; font-size: .88rem; }
.fright { padding: .65rem .8rem; border-left: 1px solid var(--border2); display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: .3rem; }
.grpbadge { font-family: 'Bebas Neue'; font-size: .85rem; letter-spacing: .08em; color: var(--gold); background: var(--goldbg2); padding: .1rem .45rem; border-radius: 4px; border: 1px solid var(--goldbrd); }
.stbadge { font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; padding: .15rem .45rem; border-radius: 3px; }
.st-done { background: var(--okbg); color: var(--lime2); }
.st-live { background: var(--livebg); color: var(--red); animation: blink .9s infinite; }
.st-soon { background: var(--soonbg); color: var(--gold2); }

/* GROUPS */
.ggrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(305px,1fr)); gap: 1.1rem; }
.gc { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform .18s; box-shadow: var(--shadow); }
.gc:hover { transform: translateY(-2px); }
.gh { padding: .62rem .9rem; background: var(--goldbg2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.gname { font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: .1em; color: var(--gold); }
.gmeta { font-size: .62rem; color: var(--muted); font-family: 'DM Mono'; }
.gtbl { width: 100%; border-collapse: collapse; }
.gtbl th { font-size: .58rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); padding: .38rem .55rem; text-align: center; border-bottom: 1px solid var(--border2); font-family: 'DM Mono'; }
.gtbl th:first-child { text-align: left; }
.gtbl td { padding: .48rem .55rem; font-size: .78rem; text-align: center; border-bottom: 1px solid var(--rowline); font-family: 'DM Mono'; white-space: nowrap; }
/* Birinchi ustun cho'ziladigan qilib, uzun jamoa nomi ochkolar ustunini siqib chiqarmasligi uchun qisqartiriladi */
.gtbl td:first-child { text-align: left; font-family: 'DM Sans'; font-weight: 500; font-size: .8rem; width: 100%; max-width: 0; }
.gtbl .trow { display: flex; align-items: center; gap: .3rem; min-width: 0; }
.gtbl .tname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gtbl tr:last-child td { border-bottom: none; }
.gtbl tr:hover td { background: var(--rowhov); }
.pb { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 3px; font-size: .6rem; font-weight: 700; margin-right: .35rem; font-family: 'DM Mono'; flex-shrink: 0; }
.p1 { background: var(--gold); color: var(--p1tx); }
.p2 { background: var(--p2bg); color: var(--gold); }
.p3 { background: var(--p3bg); color: var(--lime2); }
.p4 { background: var(--p4bg); color: var(--muted); }
.pts { font-weight: 700; color: var(--text) !important; }

/* FILTER */
.fbar { display: flex; gap: .35rem; margin-bottom: 1.1rem; flex-wrap: wrap; }
.fb { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: .3rem .75rem; border-radius: 18px; font-size: .72rem; cursor: pointer; font-family: 'DM Sans'; transition: all .18s; font-weight: 500; }
.fb.act, .fb:hover { background: var(--goldbg); border-color: var(--gold2); color: var(--gold); }

/* SCORERS */
.scorerlist { display: flex; flex-direction: column; gap: .45rem; }
.scorerrow { background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: .7rem 1rem; display: flex; align-items: center; gap: .85rem; box-shadow: var(--shadow); }
.srank { font-family: 'Bebas Neue'; font-size: 1.3rem; color: var(--muted); width: 22px; text-align: center; flex-shrink: 0; }
.srank.gold { color: var(--gold); }
.srank.silver { color: var(--silver); }
.srank.bronze { color: var(--bronze); }
.sinfo { flex: 1; }
.sname { font-weight: 600; font-size: .88rem; }
.steam { font-size: .68rem; color: var(--muted); margin-top: .06rem; }
.sgoals { font-family: 'Bebas Neue'; font-size: 1.9rem; color: var(--lime2); line-height: 1; }
.sgoals span { font-size: .6rem; color: var(--muted); font-family: 'DM Mono'; margin-left: .15rem; }
.note { background: var(--goldbg2); border: 1px solid var(--border); border-radius: 8px; padding: .75rem 1rem; margin-bottom: 1.25rem; font-size: .8rem; color: var(--text2); }

/* DRAWER */
.drawer-overlay { display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 100; backdrop-filter: blur(5px); }
.drawer-overlay.open { display: flex; align-items: center; justify-content: center; }
.drawer { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 520px; max-width: 96vw; max-height: 90vh; overflow-y: auto; animation: sup .22s ease; box-shadow: 0 18px 50px rgba(0,0,0,.3); }
@keyframes sup { from{transform:translateY(22px);opacity:0} to{transform:translateY(0);opacity:1} }
.drawer-head { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg2); z-index: 1; }
.drawer-title { font-family: 'Bebas Neue'; font-size: 1.1rem; letter-spacing: .08em; color: var(--gold); }
.drawer-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: .2rem; transition: color .15s; line-height: 1; }
.drawer-close:hover { color: var(--text); }
.drawer-body { padding: 1.25rem 1.5rem; }
.dscoreboard { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin: 1rem 0 1.5rem; }
.dteam { text-align: center; flex: 1; }
.dteam-name { font-weight: 600; font-size: .9rem; margin-top: .4rem; }
.dscore { font-family: 'Bebas Neue'; font-size: 3rem; letter-spacing: .06em; color: var(--gold); text-align: center; line-height: 1; }
.dscore.pend { font-size: 1.1rem; font-family: 'DM Sans'; color: var(--muted); font-weight: 400; }
.dmeta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: 1.25rem; }
.dmeta-item { background: var(--card2); border: 1px solid var(--border2); border-radius: 8px; padding: .6rem .8rem; }
.dmeta-label { font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: .2rem; }
.dmeta-val { font-size: .82rem; font-weight: 500; color: var(--text); }
.dsec { font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: .08em; color: var(--gold); margin-bottom: .6rem; margin-top: 1rem; }
.dnote { font-size: .78rem; color: var(--muted); padding: .5rem 0; }
.goal-row { display: flex; align-items: center; gap: .6rem; padding: .45rem 0; border-bottom: 1px solid var(--border2); font-size: .82rem; }
.goal-row:last-child { border-bottom: none; }
.goal-min { font-family: 'DM Mono'; font-size: .72rem; color: var(--gold2); min-width: 30px; }
.goal-player { flex: 1; font-weight: 500; }
.goal-team { font-size: .68rem; color: var(--muted); }
.goal-type { font-size: .65rem; color: var(--text2); background: var(--chipbg); padding: .1rem .35rem; border-radius: 3px; margin-left: auto; }
.statstbl { width: 100%; border-collapse: collapse; font-size: .8rem; }
.statstbl td { padding: .42rem .5rem; border-bottom: 1px solid var(--border2); font-family: 'DM Mono'; }
.statstbl td:first-child { color: var(--gold2); font-weight: 600; text-align: right; width: 40px; }
.statstbl td:nth-child(2) { text-align: center; color: var(--muted); font-size: .62rem; text-transform: uppercase; letter-spacing: .05em; }
.statstbl td:last-child { color: var(--text2); width: 40px; }
.statstbl tr:last-child td { border-bottom: none; }

/* TOAST */
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg3); border: 1px solid var(--lime); border-radius: 8px; padding: .65rem 1rem; color: var(--lime2); font-size: .8rem; font-weight: 500; z-index: 200; transform: translateY(70px); opacity: 0; transition: all .28s; pointer-events: none; box-shadow: var(--shadow); }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.err { border-color: var(--red); color: var(--red); }
.empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: .88rem; }
.eic { font-size: 2rem; margin-bottom: .55rem; opacity: .4; }

@media(max-width: 900px) {
  .fcard { grid-template-columns: 110px 1fr auto 1fr 80px; }
  .fvenue { display: none; }
}
@media(max-width: 700px) {
  header { position: static; flex-direction: column; height: auto; padding: .7rem 1rem; gap: .4rem; }
  main { padding: .85rem 1rem; }
  .statbar { grid-template-columns: repeat(2,1fr); }
  .fcard { grid-template-columns: 1fr auto 1fr; }
  .fmeta, .fright { display: none; }
  .dmeta-grid { grid-template-columns: 1fr; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>

<header>
  <div class="logo">⚽ FIFA 2026 <em>/ KUZATUV</em></div>
  <nav aria-label="Sahifalar">
    <button class="act" data-page="overview" onclick="showPage('overview',this)">Umumiy</button>
    <button data-page="groups" onclick="showPage('groups',this)">Guruhlar</button>
    <button data-page="matches" onclick="showPage('matches',this)">O'yinlar</button>
    <button data-page="scorers" onclick="showPage('scorers',this)">To'purarlar</button>
  </nav>
  <div class="hright">
    <div class="apipill">
      <div class="dot spin" id="dot"></div>
      <span id="apilbl">Yuklanmoqda...</span>
    </div>
    <button class="tbtn" id="themebtn" onclick="toggleTheme()" aria-label="Rejimni almashtirish">☀️</button>
  </div>
</header>

<main>
  <div id="page-overview" class="page act">
    <div class="statbar" id="statbar">
      <div class="sc skel" style="height:90px"></div>
      <div class="sc skel" style="height:90px"></div>
      <div class="sc skel" style="height:90px"></div>
      <div class="sc skel" style="height:90px"></div>
    </div>
    <div class="sec">Yaqinlashayotgan O'yinlar</div>
    <div class="mlist" id="upcoming-list">
      <div class="skel" style="height:72px"></div>
      <div class="skel" style="height:72px;margin-top:.5rem"></div>
      <div class="skel" style="height:72px;margin-top:.5rem"></div>
    </div>
    <div class="sec" style="margin-top:1.75rem">Oxirgi Natijalar</div>
    <div class="mlist" id="recent-list">
      <div class="skel" style="height:72px"></div>
      <div class="skel" style="height:72px;margin-top:.5rem"></div>
    </div>
  </div>

  <div id="page-groups" class="page">
    <div class="sec">Guruh Jadvallari</div>
    <div class="ggrid" id="ggrid"></div>
  </div>

  <div id="page-matches" class="page">
    <div class="sec">Barcha O'yinlar</div>
    <div class="fbar" id="fbar"></div>
    <div id="allmatches" class="mlist"></div>
  </div>

  <div id="page-scorers" class="page">

function fmtDateFull(dateKey) {
  if (!dateKey) return '';
  var parts = dateKey.split('-');
  var dt = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
  return parts[2] + '.' + parts[1] + '.' + parts[0] + ' — ' + DAYS[dt.getDay()];

  } catch (e) {}

    if (s === 'light' || s === 'dark') return s;
  } catch (e) {}
  try {
    if (typeof matchMedia === 'function' && matchMedia('(prefers-color-scheme: light)').matches) return 'light';
  } catch (e) {}
  return 'dark';
}

function normTeam(s) {
  var t = String(s || '').toLowerCase();
  try { t = t.normalize('NFD').replace(/[̀-ͯ]/g, ''); } catch (e) {}
  t = t.replace(/[^a-z ]/g, ' ').replace(/\s+/g, ' ').trim();
  return TEAM_ALIASES[t] || t;
}

// Aniqlik uchun faqat to'liq mos kelishni qabul qilamiz
// (oldingi qisman moslash South Africa / South Korea ni adashtirardi)
function matchFixture(ev) {
  var h = normTeam(ev.strHomeTeam);
  var a = normTeam(ev.strAwayTeam);
  if (!h || !a) return null;
  var fix = FIXTURES.find(function(f) {
    return normTeam(f.home) === h && normTeam(f.away) === a;
  });
  if (fix) return { fix: fix, swapped: false };
  fix = FIXTURES.find(function(f) {
    return normTeam(f.home) === a && normTeam(f.away) === h;
  });
  if (fix) return { fix: fix, swapped: true };
  return null;
}

// FIFA: Results[i] = { Home/Away: {TeamName:[{Description}], Score},
//   MatchStatus (0=tugagan, 3=jonli), Stadium: {Name:[...], CityName:[...]} }
function applyFifa(data) {
  var matched = 0;
  ((data && data.Results) || []).forEach(function(r) {
    try {
      var hn = r.Home && r.Home.TeamName && r.Home.TeamName[0] && r.Home.TeamName[0].Description;
      var an = r.Away && r.Away.TeamName && r.Away.TeamName[0] && r.Away.TeamName[0].Description;
      if (!hn || !an) return;
      var m = matchFixture({ strHomeTeam: hn, strAwayTeam: an });
      if (!m) return;
      var fix = m.fix;
      if (r.Stadium && r.Stadium.Name && r.Stadium.Name[0]) {
        var city = r.Stadium.CityName && r.Stadium.CityName[0] ? ', ' + r.Stadium.CityName[0].Description : '';
        fix.venue = r.Stadium.Name[0].Description + city;
      }
      if (r.MatchStatus === 3) fix.status = 'LIVE';
      else if (r.MatchStatus === 0) fix.status = 'FT';
      var hs = m.swapped ? r.Away.Score : r.Home.Score;
      var as = m.swapped ? r.Home.Score : r.Away.Score;
      if (typeof hs === 'number' && typeof as === 'number' && (r.MatchStatus === 0 || r.MatchStatus === 3)) {
        fix.homeScore = hs;
        fix.awayScore = as;
        fix.scoreSource = 'fifa';
        matched++;
      }
    } catch (e) {}
  });
  return matched;
}

// openfootball: matches[i] = { team1, team2 (satr yoki {name}),
//   score: {ft:[a,b]}, goals1/goals2: [{name, minute, penalty?, owngoal?}] }
function applyOpenfootball(data) {
  var used = 0;
  ((data && data.matches) || []).forEach(function(mt) {
    try {
      var t1 = typeof mt.team1 === 'string' ? mt.team1 : (mt.team1 && mt.team1.name);
      var t2 = typeof mt.team2 === 'string' ? mt.team2 : (mt.team2 && mt.team2.name);
      if (!t1 || !t2) return;
      var m = matchFixture({ strHomeTeam: t1, strAwayTeam: t2 });
      if (!m) return;
      var fix = m.fix;
      var s1 = null, s2 = null;
      if (mt.score && mt.score.ft && mt.score.ft.length === 2) { s1 = mt.score.ft[0]; s2 = mt.score.ft[1]; }
      else if (typeof mt.score1 === 'number' && typeof mt.score2 === 'number') { s1 = mt.score1; s2 = mt.score2; }
      if (typeof s1 !== 'number' || typeof s2 !== 'number') return;
      var hs = m.swapped ? s2 : s1;
      var as = m.swapped ? s1 : s2;
      if (fix.homeScore === null) {
        fix.homeScore = hs;
        fix.awayScore = as;
        fix.status = 'FT';
        fix.scoreSource = 'of';
      }
      // Gol ro'yxati hisobni to'liq qoplasagina ishonchli manba deb olamiz
      var g1 = mt.goals1 || [], g2 = mt.goals2 || [];
      if (hs + as > 0 && g1.length + g2.length === hs + as) {
        var conv = function(g) {
          return {
            name: g.name || '',
            time: g.minute != null ? String(g.minute) : '',
            type: g.penalty ? 'Penalty' : (g.owngoal ? 'Own Goal' : 'Normal Goal')
          };
        };
        fix.homeScorers = (m.swapped ? g2 : g1).map(conv);
        fix.awayScorers = (m.swapped ? g1 : g2).map(conv);
        fix.goalsSource = 'of';
        used++;
      }
    } catch (e) {}
  });
  return used;
}

// TheSportsDB: FIFA hisob bergan o'yinlarni qayta yozmaydi,
// lekin apiId ni doim saqlaydi (statistika/timeline uchun kerak)
function applyEvents(events) {
  var matched = 0;
  events.forEach(function(ev) {
    var m = matchFixture(ev);
    if (!m) return;
    var fix = m.fix;
    fix.apiId = ev.idEvent;
    fix.apiSwapped = m.swapped;
    if (ev.strVenue && fix.scoreSource !== 'fifa') fix.venue = ev.strVenue;
    var hs = parseInt(m.swapped ? ev.intAwayScore : ev.intHomeScore, 10);
    var as = parseInt(m.swapped ? ev.intHomeScore : ev.intAwayScore, 10);
    if (!isNaN(hs) && !isNaN(as)) {
      if (fix.scoreSource !== 'fifa') {
        fix.homeScore = hs;
        fix.awayScore = as;
        fix.status = ev.strStatus || 'FT';
        fix.scoreSource = 'tsdb';
      }
      matched++;
    } else if (fix.scoreSource !== 'fifa') {
      fix.status = ev.strStatus || 'NS';
    }
  });
  return matched;
}

function loadTsdbEvents() {
  // TheSportsDB da JCh mavsumi "2026"; eski "2025-2026" zaxira sifatida
  return fetchJson(API_BASE + '/eventsseason.php?id=' + LEAGUE_ID + '&s=2026')
    .then(function(data) {
      var events = data.events || [];
      if (events.length) return events;
      return fetchJson(API_BASE + '/eventsseason.php?id=' + LEAGUE_ID + '&s=2025-2026')
        .then(function(d2) { return d2.events || []; });
    });
}

var apiLoading = false;

function loadAll() {
  if (apiLoading) return;
  apiLoading = true;
  setApi('spin', 'API...');
  var sources = [];
  fetchJson(FIFA_URL)
    .then(function(d) { applyFifa(d); sources.push('FIFA'); })
    .catch(function() {})
    .then(function() {
      return loadTsdbEvents()
        .then(function(events) { applyEvents(events); if (events.length) sources.push('TSDB'); })
        .catch(function() {});
    })
    .then(function() {
      return fetchJson(OF_URL)
        .then(function(d) { applyOpenfootball(d); if (d && d.matches && d.matches.length) sources.push('OF'); })
        .catch(function() {});
    })
    .then(function() {
      var results = FIXTURES.filter(function(f) { return f.homeScore !== null; }).length;
      if (sources.length) {
        setApi('ok', sources.join('+') + ' · ' + results + ' natija');
      } else {
        setApi('err', 'API xatosi');
        showToast("API ga ulanib bo'lmadi", true);
      }
      buildScorerTotals();
      renderAll();
      if (curPage === 'groups') renderGroups();
      if (curPage === 'matches') renderMatches();
      if (curPage === 'scorers') renderScorers();
      loadAllScorers();
      apiLoading = false;
    });
}

function loadAllScorers() {
  // Faqat gol ro'yxati hisobni qoplamagan o'yinlar uchun so'raymiz —
  // takroriy yangilanishlarda ortiqcha trafik bo'lmasin
  var finished = FIXTURES.filter(function(f) {
    return f.apiId && f.homeScore !== null && f.goalsSource !== 'of'
      && f.homeScorers.length + f.awayScorers.length < f.homeScore + f.awayScore;
  });
  var i = 0;
  function next() {
    if (i >= finished.length) {
      buildScorerTotals();
      if (curPage === 'scorers') renderScorers();
      return;
    }
    var batch = finished.slice(i, i + 3);
    i += 3;
    var promises = batch.map(function(f) { return loadEventScorers(f); });
    Promise.all(promises).then(function() {
      setTimeout(next, 300);
    });
  }
  next();
}

// Gol uruvchilar: lookuptimeline.php (eventresults.php futbol gollarini bermaydi)
function loadEventScorers(fix) {
  return fetch(API_BASE + '/lookuptimeline.php?id=' + fix.apiId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      fix.homeScorers = [];
      fix.awayScorers = [];
      (data.timeline || []).forEach(function(t) {
        // "Goal"/"goal" kabi variantlarni qabul qilamiz; o'yinchi nomi
        // kiritilmagan gol ham ro'yxatda qolsin (nomi keyin to'ldiriladi)
        if (!/goal/i.test(t.strTimeline || '')) return;
        var entry = { name: t.strPlayer || '', time: t.intTime || '', type: t.strTimelineDetail || 'Goal' };
        var isHome = (t.strHome === 'Yes') !== fix.apiSwapped;
        if (isHome) fix.homeScorers.push(entry);
        else fix.awayScorers.push(entry);
      });
    })
    .catch(function() {});
}

function loadEventStats(fix) {
  return fetch(API_BASE + '/lookupeventstats.php?id=' + fix.apiId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var stats = data.eventstats || null;
      if (stats && fix.apiSwapped) {
        stats = stats.map(function(s) {
          return { strStat: s.strStat, intHome: s.intAway, intAway: s.intHome };
        });
      }
      fix.stats = stats;
    })
    .catch(function() {});
}

function isOwnGoal(type) {
  return String(type || '').toLowerCase().indexOf('own') >= 0;
}

function buildScorerTotals() {
  allScorers = {};
  FIXTURES.forEach(function(f) {
    if (f.homeScore === null) return;
    var goals = f.homeScorers.map(function(s) { return {name:s.name,team:f.home,type:s.type}; })
      .concat(f.awayScorers.map(function(s) { return {name:s.name,team:f.away,type:s.type}; }));
    goals.forEach(function(g) {
      if (!g.name || isOwnGoal(g.type)) return;
      if (!allScorers[g.name]) allScorers[g.name] = { name: g.name, team: g.team, goals: 0 };
      allScorers[g.name].goals++;
    });
  });
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
var LIVE_STATUSES = ['1H','2H','HT','ET','P','LIVE','1ST HALF','2ND HALF','HALFTIME','HALF TIME','EXTRA TIME','PENALTIES','PENALTY SHOOTOUT','IN PROGRESS'];
var DONE_STATUSES = ['FT','AET','PEN','FINISHED','MATCH FINISHED','FULL TIME','AFTER EXTRA TIME','AFTER PENALTIES'];

function statusLabel(f) {
  var s = String(f.status || '').toUpperCase().trim();
  if (LIVE_STATUSES.indexOf(s) >= 0) return ['st-live', 'JONLI'];
  if (DONE_STATUSES.indexOf(s) >= 0 || f.homeScore !== null) return ['st-done', 'Tugadi'];
  return ['st-soon', 'Kutilmoqda'];
}

function standings(group) {
  var t = {};
  GROUPS[group].forEach(function(n) { t[n] = {name:n,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  FIXTURES.filter(function(f) { return f.group === group && f.homeScore !== null; }).forEach(function(f) {
    var h = t[f.home], a = t[f.away];
    if (!h || !a) return;
    h.p++; a.p++; h.gf += f.homeScore; h.ga += f.awayScore; a.gf += f.awayScore; a.ga += f.homeScore;
    if (f.homeScore > f.awayScore) { h.w++; h.pts += 3; a.l++; }
    else if (f.homeScore < f.awayScore) { a.w++; a.pts += 3; h.l++; }
    else { h.d++; a.d++; h.pts++; a.pts++; }
  });
  return Object.values(t).map(function(x) { return Object.assign({}, x, {gd: x.gf - x.ga}); })
    .sort(function(a,b) { return b.pts-a.pts || b.gd-a.gd || b.gf-a.gf; });
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function renderAll() {
  renderStats();
  renderOverviewLists();
}

function renderStats() {
  var played = FIXTURES.filter(function(f) { return f.homeScore !== null; }).length;
  var goals = FIXTURES.reduce(function(s,f) { return f.homeScore !== null ? s + f.homeScore + f.awayScore : s; }, 0);
  var topArr = Object.values(allScorers).sort(function(a,b) { return b.goals - a.goals; });
  var top = topArr[0];
  document.getElementById('statbar').innerHTML =
    '<div class="sc"><div class="sl">O\'ynaldi</div><div class="sv">' + played + '</div><div class="ss">/ 72 guruh o\'yini</div></div>' +
    '<div class="sc"><div class="sl">Jami Gollar</div><div class="sv">' + goals + '</div><div class="ss">' + (played ? (goals/played).toFixed(1) : '—') + ' / o\'yin</div></div>' +
    '<div class="sc"><div class="sl">Guruhlar</div><div class="sv">12</div><div class="ss">48 jamoa · 3 davlat</div></div>' +
    '<div class="sc"><div class="sl">Top Gol</div><div class="sv">' + (top ? top.goals : '—') + '</div><div class="ss">' + (top ? esc(top.name) : "Hali yo'q") + '</div></div>';
}

function fixtureCard(f, showGroup) {
  var done = f.homeScore !== null;
  var sl = statusLabel(f);
  var stClass = sl[0], stText = sl[1];
  var venue = f.venue ? f.venue.split('(')[0].trim() : '';
  return '<div class="fcard" tabindex="0" role="button" onclick="openDrawer(\'' + f.id + '\')"'
    + ' aria-label="' + esc(f.home) + ' — ' + esc(f.away) + '">'
    + '<div class="fmeta">'
    +   '<div class="fdate">' + fxDate(f) + '</div>'
    +   '<div class="ftime">' + fxTime(f) + '</div>'
    +   '<div class="fvenue">' + esc(venue) + '</div>'
    + '</div>'
    + '<div class="fhome">'
    +   '<span>' + esc(f.home) + '</span>'
    +   flagImg(f.home, 26)
    + '</div>'
    + '<div class="fscore' + (done ? '' : ' pend') + '">'
    +   (done
          ? f.homeScore + ' &mdash; ' + f.awayScore
          : '<span class="pend-date">' + fxDate(f) + '</span><span class="pend-time">' + fxTime(f) + '</span>'
        )
    + '</div>'
    + '<div class="faway">'
    +   flagImg(f.away, 26)
    +   '<span>' + esc(f.away) + '</span>'
    + '</div>'
    + '<div class="fright">'
    +   (showGroup ? '<span class="grpbadge">Guruh ' + f.group + '</span>' : '')
    +   '<span class="stbadge ' + stClass + '">' + stText + '</span>'
    + '</div>'
    + '</div>';
}

function renderOverviewLists() {
  var upcoming = FIXTURES
    .filter(function(f) { return f.homeScore === null; })
    .sort(function(a,b) { return a.utc.localeCompare(b.utc); })
    .slice(0, 6);
  document.getElementById('upcoming-list').innerHTML = upcoming.length
    ? upcoming.map(function(f) { return fixtureCard(f, true); }).join('')
    : '<div class="empty"><div class="eic">✅</div>Barcha o\'yinlar o\'ynaldi!</div>';

  var recent = FIXTURES
    .filter(function(f) { return f.homeScore !== null; })
    .sort(function(a,b) { return b.utc.localeCompare(a.utc); })
    .slice(0, 6);
  document.getElementById('recent-list').innerHTML = recent.length
    ? recent.map(function(f) { return fixtureCard(f, true); }).join('')
    : '<div class="empty"><div class="eic">📅</div>Turnir 11-iyun 2026 boshlanadi</div>';
}

function renderGroups() {
  document.getElementById('ggrid').innerHTML = Object.keys(GROUPS).map(function(g) {
    var st = standings(g);
    var played = FIXTURES.filter(function(f) { return f.group === g && f.homeScore !== null; }).length;
    var rows = st.map(function(t, i) {
      var pc = ['p1','p2','p3','p4'][Math.min(i,3)];
      return '<tr>'
        + '<td><div class="trow">'
        +   '<span class="pb ' + pc + '">' + (i+1) + '</span>'
        +   flagImg(t.name, 18)
        +   '<span class="tname" title="' + esc(t.name) + '">' + esc(shortName(t.name)) + '</span>'
        + '</div></td>'
        + '<td>' + t.p + '</td><td>' + t.w + '</td><td>' + t.d + '</td><td>' + t.l + '</td>'
        + '<td>' + t.gf + ':' + t.ga + '</td>'
        + '<td>' + (t.gd > 0 ? '+' : '') + t.gd + '</td>'
        + '<td class="pts">' + t.pts + '</td>'
        + '</tr>';
    }).join('');
    return '<div class="gc">'
      + '<div class="gh"><span class="gname">Guruh ' + g + '</span>'
      + '<span class="gmeta">' + played + '/6 o\'yin</span></div>'
      + '<table class="gtbl"><thead><tr><th>Jamoa</th><th>O</th><th>G</th><th>D</th><th>M</th><th>G:Y</th><th>GF</th><th>O\'</th></tr></thead>'
      + '<tbody>' + rows + '</tbody></table></div>';
  }).join('');
}

function renderMatches() {
  var letters = ['all'].concat(Object.keys(GROUPS));
  document.getElementById('fbar').innerHTML = letters.map(function(g) {
    return '<button class="fb' + (mFilter === g ? ' act' : '') + '" onclick="setFilter(\'' + g + '\',this)">'
      + (g === 'all' ? 'Barchasi' : 'Guruh ' + g) + '</button>';
  }).join('');

  var list = mFilter === 'all' ? FIXTURES : FIXTURES.filter(function(f) { return f.group === mFilter; });
  list = list.slice().sort(function(a,b) { return a.utc.localeCompare(b.utc); });

  if (!list.length) {
    document.getElementById('allmatches').innerHTML = '<div class="empty"><div class="eic">📅</div>O\'yinlar topilmadi</div>';
    return;
  }

  var byDate = {};
  list.forEach(function(f) {
    var k = fxDateKey(f);
    if (!byDate[k]) byDate[k] = [];
    byDate[k].push(f);
  });

  var tk = todayKey();
  var html = '';
  Object.keys(byDate).sort().forEach(function(date) {
    html += '<div class="date-group">📅 ' + fmtDateFull(date)
      + (date === tk ? '<span class="today-badge">BUGUN</span>' : '') + '</div>';
    html += byDate[date].map(function(f) { return fixtureCard(f, mFilter === 'all'); }).join('');
  });
  document.getElementById('allmatches').innerHTML = html;
}

function renderScorers() {
  var list = Object.values(allScorers).sort(function(a,b) { return b.goals - a.goals; });
  if (!list.length) {
    document.getElementById('scorer-list').innerHTML =
      '<div class="empty"><div class="eic">⚽</div>Gol ma\'lumotlari turnir boshlanishi bilan ko\'rinadi</div>';
    return;
  }
  document.getElementById('scorer-list').innerHTML = list.map(function(s, i) {
    var rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    return '<div class="scorerrow">'
      + '<div class="srank ' + rankClass + '">' + (i+1) + '</div>'
      + flagImg(s.team, 26)
      + '<div class="sinfo"><div class="sname">' + esc(s.name) + '</div><div class="steam">' + esc(s.team) + '</div></div>'
      + '<div class="sgoals">' + s.goals + '<span>gol</span></div>'
      + '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════════
// DRAWER
// ═══════════════════════════════════════════════════
function openDrawer(fixId) {
  var f = FIXTURES.find(function(x) { return x.id === fixId; });
  if (!f) return;
  openDrawerId = fixId;
  document.getElementById('drawer-title').textContent = 'Guruh ' + f.group + ' · ' + fxDate(f);
  document.getElementById('drawer-overlay').classList.add('open');
  renderDrawerContent(f);

  if (f.apiId && f.homeScore !== null) {
    var jobs = [];
    if (!f.stats) jobs.push(loadEventStats(f));
    // Gol ro'yxati hisobdan kam bo'lsa — API da keyin to'ldirilgan
    // bo'lishi mumkin, qayta so'raymiz (openfootball ro'yxati to'liq keladi)
    if (f.goalsSource !== 'of'
        && f.homeScorers.length + f.awayScorers.length < f.homeScore + f.awayScore) {
      jobs.push(loadEventScorers(f).then(function() {
        buildScorerTotals();
        if (curPage === 'scorers') renderScorers();
      }));
    }
    if (jobs.length) {
      Promise.all(jobs).then(function() {
        if (openDrawerId === fixId) renderDrawerContent(f);
      });
    }
  }
}

function renderDrawerContent(f) {
  var done = f.homeScore !== null;
  var sl = statusLabel(f);

  var scorersHtml = '';
  if (done) {
    var allGoals = f.homeScorers.map(function(s) { return {name:s.name,team:f.home,time:s.time,type:s.type}; })
      .concat(f.awayScorers.map(function(s) { return {name:s.name,team:f.away,time:s.time,type:s.type}; }))
      .sort(function(a,b) { return (parseInt(a.time,10)||0) - (parseInt(b.time,10)||0); });

    scorersHtml = '<div class="dsec">⚽ Gol Uruvchilar</div>';
    if (allGoals.length) {
      scorersHtml += allGoals.map(function(g) {
        return '<div class="goal-row">'
          + '<span class="goal-min">' + (g.time ? esc(g.time) + "'" : '—') + '</span>'
          + flagImg(g.team, 18)
          + '<span class="goal-player">' + (esc(g.name) || "Noma'lum o'yinchi") + '</span>'
          + '<span class="goal-team">' + esc(g.team) + '</span>'
          + (g.type && g.type !== 'Goal' && g.type !== 'Normal Goal' ? '<span class="goal-type">' + esc(g.type) + '</span>' : '')
          + '</div>';
      }).join('');
    }
    var totalGoals = f.homeScore + f.awayScore;
    var missing = totalGoals - allGoals.length;
    if (totalGoals === 0) {
      scorersHtml += '<div class="dnote">Bu o\'yinda gol bo\'lmagan</div>';
    } else if (missing > 0) {
      scorersHtml += '<div class="dnote">⚠️ ' + missing + ' ta gol tafsiloti API da hali kiritilmagan</div>';
    }
  }

  var statsHtml = '';
  if (f.stats && f.stats.length) {
    statsHtml = '<div class="dsec">📊 Statistika</div><table class="statstbl">'
      + f.stats.map(function(s) {
          return '<tr><td>' + esc(s.intHome || 0) + '</td>'
            + '<td>' + esc(s.strStat) + '</td>'
            + '<td>' + esc(s.intAway || 0) + '</td></tr>';
        }).join('')
      + '</table>';
  }

  document.getElementById('drawer-body').innerHTML =
    '<div class="dscoreboard">'
    + '<div class="dteam">' + flagImg(f.home, 48) + '<div class="dteam-name">' + esc(f.home) + '</div></div>'
    + '<div class="' + (done ? 'dscore' : 'dscore pend') + '">' + (done ? f.homeScore + ' — ' + f.awayScore : 'VS') + '</div>'
    + '<div class="dteam">' + flagImg(f.away, 48) + '<div class="dteam-name">' + esc(f.away) + '</div></div>'
    + '</div>'
    + '<div class="dmeta-grid">'
    + '<div class="dmeta-item"><div class="dmeta-label">Sana</div><div class="dmeta-val">' + fxDate(f) + '</div></div>'
    + '<div class="dmeta-item"><div class="dmeta-label">Soat (mahalliy)</div><div class="dmeta-val">' + fxTime(f) + '</div></div>'
    + '<div class="dmeta-item"><div class="dmeta-label">Stadion</div><div class="dmeta-val">' + (esc(f.venue) || '—') + '</div></div>'
    + '<div class="dmeta-item"><div class="dmeta-label">Holat</div><div class="dmeta-val"><span class="stbadge ' + sl[0] + '">' + sl[1] + '</span></div></div>'
    + '</div>'
    + scorersHtml
    + statsHtml;
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  openDrawerId = null;
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('act'); });
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('act'); });
  document.getElementById('page-' + page).classList.add('act');
  if (btn) btn.classList.add('act');
  curPage = page;
  if (page === 'groups') renderGroups();
  if (page === 'matches') renderMatches();
  if (page === 'scorers') renderScorers();
  // URL hash — sahifani ulashish va "orqaga" tugmasi uchun
  try { if (location.hash !== '#' + page) location.hash = page; } catch (e) {}
}

function navTo(page) {
  var target = null;
  document.querySelectorAll('nav button').forEach(function(b) {
    if (b.getAttribute && b.getAttribute('data-page') === page) target = b;
  });
  showPage(page, target);
}

function setFilter(g, btn) {
  mFilter = g;
  document.querySelectorAll('.fb').forEach(function(b) { b.classList.remove('act'); });
  if (btn) btn.classList.add('act');
  renderMatches();
}

function showToast(msg, err) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (err ? ' err' : '');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}

document.getElementById('drawer-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeDrawer();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDrawer();
  // O'yin kartalari klaviaturadan ham ochiladi
  if ((e.key === 'Enter' || e.key === ' ') && e.target && e.target.classList
      && e.target.classList.contains('fcard')) {
    e.preventDefault();
    e.target.click();
  }
});
