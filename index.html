<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 — Turnir Kuzatuvi</title>
<meta name="theme-color" content="#081f11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="FIFA Jahon Chempionati 2026 — guruhlar, natijalar, to'purarlar">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #081f11; --green2: #0d2e18; --green3: #123522;
  --lime: #27ae60; --lime2: #2ecc71;
  --gold: #f0c040; --gold2: #c9a227;
  --red2: #e74c3c;
  --white: #ede8dc; --offwhite: #b8c4bc; --grey: #6b7f72;
  --card: rgba(255,255,255,0.035); --border: rgba(240,192,64,0.13);
  --border2: rgba(255,255,255,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--green); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 100% 60% at 50% -5%, rgba(39,174,96,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(240,192,64,0.04) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.008) 80px, rgba(255,255,255,0.008) 81px),
    repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.008) 80px, rgba(255,255,255,0.008) 81px);
}
header {
  position: relative; z-index: 10;
  padding: 0 1.75rem;
  background: rgba(0,0,0,0.35);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  height: 58px; gap: 1rem;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem; letter-spacing: .14em; color: var(--gold); white-space: nowrap; display: flex; align-items: center; gap: .5rem; }
.logo em { color: var(--white); opacity: .5; font-size: .8rem; font-style: normal; letter-spacing: .06em; }
nav { display: flex; gap: .15rem; }
nav button { background: none; border: none; color: var(--grey); font-family: 'DM Sans', sans-serif; font-size: .75rem; font-weight: 500; padding: .4rem .85rem; border-radius: 6px; cursor: pointer; transition: all .18s; text-transform: uppercase; letter-spacing: .05em; }
nav button:hover { color: var(--white); background: rgba(255,255,255,.06); }
nav button.act { color: var(--gold); background: rgba(240,192,64,.1); border: 1px solid rgba(240,192,64,.18); }
.apipill { display: flex; align-items: center; gap: .38rem; font-size: .66rem; color: var(--grey); white-space: nowrap; background: rgba(0,0,0,.25); padding: .28rem .65rem; border-radius: 16px; border: 1px solid var(--border2); font-family: 'DM Mono'; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--grey); transition: background .3s; flex-shrink: 0; }
.dot.ok { background: var(--lime2); }
.dot.err { background: var(--red2); }
.dot.spin { background: var(--gold); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
main { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 1.5rem 1.75rem; }
.page { display: none; }
.page.act { display: block; }
.sec { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .1em; color: var(--gold); margin-bottom: 1.25rem; display: flex; align-items: center; gap: .75rem; }
.sec::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold2), transparent); opacity: .3; }
.skel { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shim 1.6s infinite; border-radius: 8px; }
@keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* STATS */
.statbar { display: grid; grid-template-columns: repeat(4,1fr); gap: .85rem; margin-bottom: 1.75rem; }
.sc { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.3rem; position: relative; overflow: hidden; }
.sc::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold), transparent); }
.sl { font-size: .64rem; text-transform: uppercase; letter-spacing: .13em; color: var(--grey); margin-bottom: .3rem; }
.sv { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--gold); line-height: 1; }
.ss { font-size: .68rem; color: var(--grey); margin-top: .2rem; }

/* FIXTURE CARD */
.mlist { display: flex; flex-direction: column; gap: .5rem; }
.date-group { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--grey); padding: .6rem 0 .35rem; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid var(--border2); margin-bottom: .4rem; margin-top: .75rem; }
.date-group:first-child { margin-top: 0; }
.fcard { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: grid; grid-template-columns: 130px 1fr auto 1fr 110px; align-items: stretch; transition: border-color .18s; cursor: pointer; }
.fcard:hover { border-color: rgba(240,192,64,.35); }
.fmeta { padding: .65rem .85rem; border-right: 1px solid var(--border2); display: flex; flex-direction: column; justify-content: center; gap: .18rem; }
.fdate { font-size: .68rem; color: var(--gold2); font-family: 'DM Mono'; font-weight: 500; }
.ftime { font-size: .85rem; color: var(--white); font-family: 'Bebas Neue'; letter-spacing: .06em; }
.fvenue { font-size: .58rem; color: var(--grey); line-height: 1.3; margin-top: .1rem; }
.fhome { display: flex; align-items: center; justify-content: flex-end; gap: .5rem; padding: .65rem .8rem; font-weight: 600; font-size: .88rem; text-align: right; min-width: 0; }
.fscore { display: flex; align-items: center; justify-content: center; padding: 0 .6rem; min-width: 70px; font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem; letter-spacing: .06em; color: var(--gold); white-space: nowrap; flex-shrink: 0; }
.fscore.pend { font-family: 'DM Sans'; font-size: .72rem; color: var(--offwhite); letter-spacing: 0; text-align: center; line-height: 1.5; flex-direction: column; gap: 0; }
.fscore.pend .pend-date { font-size: .68rem; color: var(--grey); font-family: 'DM Mono'; }
.fscore.pend .pend-time { font-size: 1rem; color: var(--gold); font-family: 'Bebas Neue'; letter-spacing: .06em; }
.faway { display: flex; align-items: center; justify-content: flex-start; gap: .5rem; padding: .65rem .8rem; font-weight: 600; font-size: .88rem; min-width: 0; }
.team-link { cursor: pointer; transition: color .15s; }
.team-link:hover { color: var(--gold); text-decoration: underline; }
.fright { padding: .65rem .8rem; border-left: 1px solid var(--border2); display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: .3rem; }
.grpbadge { font-family: 'Bebas Neue'; font-size: .85rem; letter-spacing: .08em; color: var(--gold); background: rgba(240,192,64,.08); padding: .1rem .45rem; border-radius: 4px; border: 1px solid rgba(240,192,64,.15); }
.stbadge { font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; padding: .15rem .45rem; border-radius: 3px; }
.st-done { background: rgba(39,174,96,.14); color: var(--lime2); }
.st-live { background: rgba(231,76,60,.18); color: var(--red2); animation: blink .9s infinite; }
.st-soon { background: rgba(240,192,64,.09); color: var(--gold2); }
.tflag { width: 26px; height: 18px; object-fit: cover; border-radius: 2px; flex-shrink: 0; display: block; }

/* GROUPS */
.ggrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(305px,1fr)); gap: 1.1rem; }
.gc { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform .18s; }
.gc:hover { transform: translateY(-2px); }
.gh { padding: .62rem .9rem; background: rgba(240,192,64,.06); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.gname { font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: .1em; color: var(--gold); }
.gtbl { width: 100%; border-collapse: collapse; }
.gtbl th { font-size: .58rem; text-transform: uppercase; letter-spacing: .07em; color: var(--grey); padding: .38rem .55rem; text-align: center; border-bottom: 1px solid var(--border2); font-family: 'DM Mono'; }
.gtbl th:first-child { text-align: left; }
.gtbl td { padding: .48rem .55rem; font-size: .78rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,.03); font-family: 'DM Mono'; }
.gtbl td:first-child { text-align: left; font-family: 'DM Sans'; font-weight: 500; font-size: .8rem; }
.gtbl tr:last-child td { border-bottom: none; }
.gtbl tr:hover td { background: rgba(255,255,255,.025); }
.pb { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 3px; font-size: .6rem; font-weight: 700; margin-right: .35rem; font-family: 'DM Mono'; flex-shrink: 0; }
.p1 { background: var(--gold); color: var(--green); }
.p2 { background: rgba(240,192,64,.22); color: var(--gold); }
.p3 { background: rgba(39,174,96,.18); color: var(--lime2); }
.p4 { background: rgba(255,255,255,.07); color: var(--grey); }
.pts { font-weight: 700; color: var(--white) !important; }

/* FILTER */
.fbar { display: flex; gap: .35rem; margin-bottom: 1.1rem; flex-wrap: wrap; }
.fbar-mobile { display: none; width: 100%; padding: .45rem .7rem; border-radius: 8px; font-family: 'DM Sans'; font-size: .82rem; font-weight: 500; cursor: pointer; outline: none; background: var(--card); border: 1px solid var(--border); color: var(--white); margin-bottom: .75rem; }
.fb { background: var(--card); border: 1px solid var(--border); color: var(--grey); padding: .3rem .75rem; border-radius: 18px; font-size: .72rem; cursor: pointer; font-family: 'DM Sans'; transition: all .18s; font-weight: 500; }
.fb.act, .fb:hover { background: rgba(240,192,64,.12); border-color: var(--gold2); color: var(--gold); }
.team-select { background: var(--card); border: 1px solid var(--border); color: var(--white); padding: .38rem .7rem; border-radius: 8px; font-family: 'DM Sans'; font-size: .78rem; cursor: pointer; min-width: 180px; outline: none; }
select option { background: var(--green2); color: var(--white); }
body.light .team-select { background: #f5f2eb; color: #1a2a1f; border-color: rgba(0,0,0,.1); }

/* SCORERS */
.scorerlist { display: flex; flex-direction: column; gap: .45rem; }
.scorerrow { background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: .7rem 1rem; display: flex; align-items: center; gap: .85rem; }
.srank { font-family: 'Bebas Neue'; font-size: 1.3rem; color: var(--grey); width: 22px; text-align: center; flex-shrink: 0; }
.srank.gold { color: var(--gold); }
.srank.silver { color: #aaa; }
.srank.bronze { color: #cd7f32; }
.sinfo { flex: 1; }
.sname { font-weight: 600; font-size: .88rem; }
.steam { font-size: .68rem; color: var(--grey); margin-top: .06rem; }
.sgoals { font-family: 'Bebas Neue'; font-size: 1.9rem; color: var(--lime2); line-height: 1; }
.sgoals span { font-size: .6rem; color: var(--grey); font-family: 'DM Mono'; margin-left: .15rem; }

/* DRAWER */
.drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 100; backdrop-filter: blur(5px); }
.drawer-overlay.open { display: flex; align-items: center; justify-content: center; }
.drawer { background: var(--green2); border: 1px solid var(--border); border-radius: 16px; width: 520px; max-width: 96vw; max-height: 90vh; overflow-y: auto; animation: sup .22s ease; }
@keyframes sup { from{transform:translateY(22px);opacity:0} to{transform:translateY(0);opacity:1} }
.drawer-head { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.drawer-close { background: none; border: none; color: var(--grey); font-size: 1.2rem; cursor: pointer; padding: .2rem; transition: color .15s; line-height: 1; }
.drawer-close:hover { color: var(--white); }
.drawer-body { padding: 1.25rem 1.5rem; }
.dscoreboard { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin: 1rem 0 1.5rem; }
.dteam { text-align: center; flex: 1; }
.dteam-name { font-weight: 600; font-size: .9rem; margin-top: .4rem; }
.dscore { font-family: 'Bebas Neue'; font-size: 3rem; letter-spacing: .06em; color: var(--gold); text-align: center; line-height: 1; }
.dscore.pend { font-size: 1.1rem; font-family: 'DM Sans'; color: var(--grey); font-weight: 400; }
.dmeta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: 1.25rem; }
.dmeta-item { background: rgba(255,255,255,.03); border: 1px solid var(--border2); border-radius: 8px; padding: .6rem .8rem; }
.dmeta-label { font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; color: var(--grey); margin-bottom: .2rem; }
.dmeta-val { font-size: .82rem; font-weight: 500; color: var(--white); }
.dsec { font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: .08em; color: var(--gold); margin-bottom: .6rem; margin-top: 1rem; }
.goal-row { display: flex; align-items: center; gap: .6rem; padding: .45rem 0; border-bottom: 1px solid var(--border2); font-size: .82rem; }
.goal-row:last-child { border-bottom: none; }
.goal-min { font-family: 'DM Mono'; font-size: .72rem; color: var(--gold2); min-width: 30px; }
.goal-player { flex: 1; font-weight: 500; }
.goal-team { font-size: .68rem; color: var(--grey); }
.goal-type { font-size: .65rem; color: var(--offwhite); background: rgba(255,255,255,.07); padding: .1rem .35rem; border-radius: 3px; margin-left: auto; }
.statstbl { width: 100%; border-collapse: collapse; font-size: .8rem; }
.statstbl td { padding: .42rem .5rem; border-bottom: 1px solid var(--border2); font-family: 'DM Mono'; }
.statstbl td:first-child { color: var(--gold2); font-weight: 600; text-align: right; width: 40px; }
.statstbl td:nth-child(2) { text-align: center; color: var(--grey); font-size: .62rem; text-transform: uppercase; letter-spacing: .05em; }
.statstbl td:last-child { color: var(--offwhite); width: 40px; }
.statstbl tr:last-child td { border-bottom: none; }

/* TOAST */
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--green3); border: 1px solid var(--lime); border-radius: 8px; padding: .65rem 1rem; color: var(--lime2); font-size: .8rem; font-weight: 500; z-index: 200; transform: translateY(70px); opacity: 0; transition: all .28s; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.err { border-color: var(--red2); color: var(--red2); }
.empty { text-align: center; padding: 2.5rem; color: var(--grey); font-size: .88rem; }
.eic { font-size: 2rem; margin-bottom: .55rem; opacity: .4; }

/* PLAYOFF BRACKET */
.bracket { display: flex; flex-direction: column; gap: 1.5rem; }
.bracket-round { margin-bottom: .5rem; }
.bracket-title { font-family: 'Bebas Neue'; font-size: 1.1rem; letter-spacing: .08em; color: var(--gold); margin-bottom: .7rem; display: flex; align-items: center; gap: .5rem; }
.bracket-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold2), transparent); opacity: .25; }
.bracket-games { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: .6rem; }
.ko-card { background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: .7rem .9rem; cursor: pointer; transition: border-color .18s; }
.ko-card:hover { border-color: rgba(240,192,64,.35); }
.ko-teams { display: flex; align-items: center; gap: .5rem; }
.ko-vs { color: var(--grey); font-size: .7rem; margin: 0 .2rem; }
.ko-score { font-family: 'Bebas Neue'; font-size: 1.2rem; color: var(--gold); margin-left: auto; white-space: nowrap; }
.ko-meta { display: flex; gap: .6rem; margin-top: .35rem; font-size: .62rem; color: var(--grey); font-family: 'DM Mono'; }

/* SEARCH */
.search-wrap { position: relative; }
.search-input { background: rgba(0,0,0,.25); border: 1px solid var(--border2); color: var(--white); padding: .35rem .7rem .35rem 1.8rem; border-radius: 8px; font-family: 'DM Sans'; font-size: .75rem; width: 180px; outline: none; transition: border-color .18s; }
.search-input:focus { border-color: var(--gold2); }
.search-input::placeholder { color: var(--grey); }
.search-icon { position: absolute; left: .55rem; top: 50%; transform: translateY(-50%); font-size: .75rem; color: var(--grey); pointer-events: none; }
.search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--green2); border: 1px solid var(--border); border-radius: 8px; margin-top: .3rem; z-index: 50; max-height: 260px; overflow-y: auto; display: none; }
.search-results.open { display: block; }
.search-item { padding: .5rem .75rem; font-size: .78rem; cursor: pointer; display: flex; align-items: center; gap: .5rem; border-bottom: 1px solid var(--border2); transition: background .12s; }
.search-item:last-child { border-bottom: none; }
.search-item:hover { background: rgba(255,255,255,.04); }
.search-item .si-type { font-size: .6rem; color: var(--grey); font-family: 'DM Mono'; text-transform: uppercase; margin-left: auto; }

/* FAVORITES */
.fav-star { cursor: pointer; font-size: .9rem; opacity: .3; transition: opacity .15s; flex-shrink: 0; user-select: none; }
.fav-star:hover { opacity: .7; }
.fav-star.active { opacity: 1; color: var(--gold); }
.fav-sec { margin-bottom: 1.5rem; }

/* THEME TOGGLE */
.theme-btn { background: none; border: 1px solid var(--border2); color: var(--grey); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: .85rem; display: flex; align-items: center; justify-content: center; transition: all .18s; flex-shrink: 0; }
.theme-btn:hover { color: var(--white); border-color: var(--gold2); }

/* TEAM DRAWER */
.td-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: .45rem; margin: .75rem 0; }
.td-stat { background: rgba(255,255,255,.03); border: 1px solid var(--border2); border-radius: 8px; padding: .5rem; text-align: center; }
.td-stat-val { font-family: 'Bebas Neue'; font-size: 1.4rem; color: var(--gold); line-height: 1; }
.td-stat-lbl { font-size: .58rem; color: var(--grey); text-transform: uppercase; letter-spacing: .08em; margin-top: .15rem; }
.td-match { display: flex; align-items: center; gap: .5rem; padding: .45rem 0; border-bottom: 1px solid var(--border2); font-size: .8rem; }
.td-match:last-child { border-bottom: none; }
.td-match-score { font-family: 'Bebas Neue'; font-size: 1.1rem; color: var(--gold); min-width: 50px; text-align: center; }
.td-match-date { font-size: .65rem; color: var(--grey); font-family: 'DM Mono'; margin-left: auto; }

/* LIGHT THEME */
body.light { background: #f0ede6; color: #1a2a1f; }
body.light::before { background: none; }
body.light header { background: rgba(255,255,255,.85); border-bottom-color: rgba(0,0,0,.08); }
body.light .logo { color: #8b6914; }
body.light .logo em { color: #1a2a1f; }
body.light nav button { color: #6b7f72; }
body.light nav button:hover { color: #1a2a1f; background: rgba(0,0,0,.04); }
body.light nav button.act { color: #8b6914; background: rgba(139,105,20,.08); border-color: rgba(139,105,20,.18); }
body.light .apipill { background: rgba(0,0,0,.04); border-color: rgba(0,0,0,.08); color: #6b7f72; }
body.light .sc, body.light .fcard, body.light .gc, body.light .scorerrow, body.light .ko-card { background: rgba(255,255,255,.7); border-color: rgba(0,0,0,.08); }
body.light .sec, body.light .gname, body.light .bracket-title { color: #8b6914; }
body.light .sec::after, body.light .bracket-title::after { background: linear-gradient(90deg, #c9a227, transparent); }
body.light .sv, body.light .fscore, body.light .dscore, body.light .ko-score { color: #8b6914; }
body.light .sl, body.light .ss, body.light .fdate, body.light .goal-min { color: #6b7f72; }
body.light .fhome, body.light .faway, body.light .dteam-name { color: #1a2a1f; }
body.light .drawer { background: #f5f2eb; border-color: rgba(0,0,0,.1); }
body.light .drawer-overlay { background: rgba(0,0,0,.35); }
body.light .dmeta-item, body.light .td-stat { background: rgba(0,0,0,.03); border-color: rgba(0,0,0,.06); }
body.light .dmeta-val { color: #1a2a1f; }
body.light .dmeta-label { color: #5a6e62; }
body.light .dscore.pend { color: #5a6e62; }
body.light .dsec { color: #8b6914; }
body.light .drawer-close { color: #5a6e62; }
body.light .drawer-close:hover { color: #1a2a1f; }
body.light .goal-player { color: #1a2a1f; }
body.light .goal-team { color: #5a6e62; }
body.light .goal-min { color: #8b6914; }
body.light .goal-type { background: rgba(0,0,0,.06); color: #5a6e62; }
body.light .stbadge { color: #1a2a1f; }
body.light .st-soon { background: rgba(139,105,20,.1); color: #8b6914; }
body.light .st-done { background: rgba(39,174,96,.1); color: #1a8a4a; }
body.light .sname { color: #1a2a1f; }
body.light .steam { color: #5a6e62; }
body.light .sgoals { color: #1a8a4a; }

// XSS himoya
function esc(str) {
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function flagImg(team, size) {
  var url = FLAGS[team];

// DATE / TIME HELPERS
// ═══════════════════════════════════════════════════
var DAYS = ['Yak', 'Dush', 'Sesh', 'Chor', 'Pay', 'Jum', 'Shan'];

function fmtDateFull(dateStr) {
  if (!dateStr) return '—';
  var parts = dateStr.split('-');
  var y = parts[0], m = parts[1], d = parts[2];
  var dt = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
  return d + '.' + m + '.' + y + ' — ' + DAYS[dt.getDay()];
}

function fmtDate(dateStr) {
  if (!dateStr) return '—';
  var parts = dateStr.split('-');
  return parts[2] + '.' + parts[1] + '.' + parts[0];
}

function fmtTime(timeStr) {
  if (!timeStr) return '—';
  var parts = timeStr.split(':');
  var hh = parseInt(parts[0]);
  var mm = parseInt(parts[1] || 0);
  var now = new Date();
  var d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, 0));
  var lh = d.getHours();
  var lm = d.getMinutes();
  return (lh < 10 ? '0' : '') + lh + ':' + (lm < 10 ? '0' : '') + lm;
}

// ═══════════════════════════════════════════════════
// TEAM NAME MATCHING (API nomlari bilan moslashtirish)
// ═══════════════════════════════════════════════════
var TEAM_ALIASES = {
  'korea republic': ['south korea', 'korea rep', 'korea'],
  'ivory coast': ['cote divoire', 'cote d ivoire', 'cote d\'ivoire'],
  'bosnia and herzegovina': ['bosnia herzegovina', 'bosnia herz', 'bosnia'],
  'congo dr': ['dr congo', 'dem rep congo', 'democratic republic of the congo', 'congo'],
  'usa': ['united states', 'us'],
  'turkey': ['turkiye', 'trkiye'],
  'curacao': ['curaao', 'curacao'],
  'cape verde': ['cabo verde'],
  'czechia': ['czech republic', 'czech rep'],
};

function normalizeTeam(name) {
  return (name || '').toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
}

function teamsMatch(name1, name2) {
  var n1 = normalizeTeam(name1);
  var n2 = normalizeTeam(name2);
  if (!n1 || !n2) return false;
  if (n1 === n2) return true;
  if (n1.length > 3 && n2.length > 3 && (n1.indexOf(n2) >= 0 || n2.indexOf(n1) >= 0)) return true;
  var expand1 = [n1], expand2 = [n2];
  Object.keys(TEAM_ALIASES).forEach(function(key) {
    var vals = TEAM_ALIASES[key].map(normalizeTeam);
    if (key === n1 || vals.indexOf(n1) >= 0) { expand1.push(key); expand1 = expand1.concat(vals); }
    if (key === n2 || vals.indexOf(n2) >= 0) { expand2.push(key); expand2 = expand2.concat(vals); }
  });
  for (var i = 0; i < expand1.length; i++) {
    if (expand2.indexOf(expand1[i]) >= 0) return true;
  }
  return false;
}

function matchFixture(team1, team2) {
  return FIXTURES.find(function(f) {
    return (teamsMatch(f.home, team1) && teamsMatch(f.away, team2))
        || (teamsMatch(f.home, team2) && teamsMatch(f.away, team1));
  });
}

function parseApiTime(timeStr) {
  if (!timeStr) return null;
  var m = timeStr.match(/(\d{2}):(\d{2})\s*UTC([+-]?\d+)?/);
  if (!m) return timeStr.substring(0, 5);
  var hh = parseInt(m[1]);
  var mm = parseInt(m[2]);
  var offset = m[3] ? parseInt(m[3]) : 0;
  var utcHH = hh - offset;
  while (utcHH < 0) utcHH += 24;
  while (utcHH >= 24) utcHH -= 24;
  return (utcHH < 10 ? '0' : '') + utcHH + ':' + (mm < 10 ? '0' : '') + mm;
}

// ═══════════════════════════════════════════════════
// API LOADING (openfootball/worldcup.json)
// ═══════════════════════════════════════════════════
var REFRESH_INTERVAL = 5 * 60 * 1000; // 5 daqiqa
var refreshTimer = null;

function loadAll() {
  setApi('spin', 'Yuklanmoqda...');
  fetch(DATA_URL, {cache: 'no-cache'})
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var matches = data.matches || [];
      var scheduled = 0, results = 0;
      matches.forEach(function(m) {
        if (!m.group) return;
        var fix = matchFixture(m.team1, m.team2);
        if (!fix) return;
        var isReversed = teamsMatch(fix.home, m.team2) && teamsMatch(fix.away, m.team1);
        // Jadval ma'lumotlari
        if (m.date) { fix.date = m.date; scheduled++; }
        if (m.time) fix.time = parseApiTime(m.time);
        if (m.ground) fix.venue = m.ground;
        // Natijalar (score: {ft: [1,2], ht: [0,1]})
        if (m.score && m.score.ft) {
          var ft = m.score.ft;
          fix.homeScore = isReversed ? ft[1] : ft[0];
          fix.awayScore = isReversed ? ft[0] : ft[1];
          fix.htScore = m.score.ht || null;
          if (isReversed && fix.htScore) fix.htScore = [fix.htScore[1], fix.htScore[0]];
          fix.status = 'FT';
          results++;
        }
        // Gol uruvchilar
        var g1 = (m.goals1 || []).map(function(g) {
          return {name: g.name, time: String(g.minute || ''), type: g.penalty ? 'Penalty' : g.owngoal ? 'OG' : 'Goal', offset: g.offset || 0};
        });
        var g2 = (m.goals2 || []).map(function(g) {
          return {name: g.name, time: String(g.minute || ''), type: g.penalty ? 'Penalty' : g.owngoal ? 'OG' : 'Goal', offset: g.offset || 0};
        });
        if (isReversed) {
          fix.homeScorers = g2;
          fix.awayScorers = g1;
        } else {
          fix.homeScorers = g1;
          fix.awayScorers = g2;
        }
      });
      // Knockout o'yinlarini parse qilish
      KNOCKOUTS = [];
      matches.forEach(function(m) {
        if (m.group) return;
        if (!m.round) return;
        KNOCKOUTS.push({
          round: m.round,
          num: m.num || null,
          team1: m.team1 || null,
          team2: m.team2 || null,
          date: m.date || null,
          time: m.time ? parseApiTime(m.time) : null,
          venue: m.ground || null,
          score: m.score || null
        });
      });
      // Golchilar jadvalini yangilash
      buildScorerTotals();
      var now = new Date();
      var timeStr = (now.getHours() < 10 ? '0' : '') + now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
      setApi('ok', scheduled + ' jadval · ' + results + ' natija · ' + timeStr);
      renderAll();
      if (curPage === 'groups') renderGroups();
      if (curPage === 'matches') renderMatches();
      if (curPage === 'scorers') renderScorers();
      if (curPage === 'playoff') renderPlayoff();
      // Auto-refresh
      scheduleRefresh();
    })
    .catch(function(e) {
      setApi('err', "Ma'lumot yuklanmadi");
      showToast("API ga ulanib bo'lmadi: " + e.message, true);
      renderAll();
      scheduleRefresh();
    });
}

function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadAll, REFRESH_INTERVAL);
}

function manualRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  loadAll();
}

function buildScorerTotals() {
  allScorers = {};
  FIXTURES.forEach(function(f) {
    if (f.homeScore === null) return;
    var goals = f.homeScorers.map(function(s) { return {name:s.name,team:f.home,type:s.type,time:s.time}; })
      .concat(f.awayScorers.map(function(s) { return {name:s.name,team:f.away,type:s.type,time:s.time}; }));
    goals.forEach(function(g) {
      if (!g.name || g.type === 'OG') return;
      if (!allScorers[g.name]) allScorers[g.name] = { name: g.name, team: g.team, goals: 0 };
      allScorers[g.name].goals++;
    });
  });
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function statusLabel(f) {
  var s = f.status;
  if (s === '1H' || s === '2H' || s === 'HT' || s === 'ET' || s === 'P') return ['st-live', 'JONLI'];
  if (s === 'FT' || s === 'AET' || s === 'PEN') return ['st-done', 'Tugadi'];
  return ['st-soon', 'Kutilmoqda'];
}

function standings(group) {
  var t = {};
  GROUPS[group].teams.forEach(function(n) { t[n] = {name:n,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  FIXTURES.filter(function(f) { return f.group === group && f.homeScore !== null; }).forEach(function(f) {
    var h = t[f.home], a = t[f.away];
    if (!h || !a) return;
    h.p++; a.p++; h.gf += f.homeScore; h.ga += f.awayScore; a.gf += f.awayScore; a.ga += f.homeScore;
    if (f.homeScore > f.awayScore) { h.w++; h.pts += 3; a.l++; }
    else if (f.homeScore < f.awayScore) { a.w++; a.pts += 3; h.l++; }
    else { h.d++; a.d++; h.pts++; a.pts++; }
  });
  return Object.values(t).map(function(x) { return Object.assign({}, x, {gd: x.gf - x.ga}); })
    .sort(function(a,b) { return b.pts-a.pts || b.gd-a.gd || b.gf-a.gf; });
}

function renderAll() {
  renderStats();
  renderOverviewLists();
}

function renderStats() {
  var played = FIXTURES.filter(function(f) { return f.homeScore !== null; }).length;
  var goals = FIXTURES.reduce(function(s,f) { return f.homeScore !== null ? s + f.homeScore + f.awayScore : s; }, 0);
  var topArr = Object.values(allScorers).sort(function(a,b) { return b.goals - a.goals; });
  var top = topArr[0];
  document.getElementById('statbar').innerHTML =
    '<div class="sc"><div class="sl">O\'yinlar</div><div class="sv">' + played + '</div><div class="ss">/ 104 ta jami</div></div>' +
    '<div class="sc"><div class="sl">Jami Gollar</div><div class="sv">' + goals + '</div><div class="ss">' + (played ? (goals/played).toFixed(1) : '—') + ' / o\'yin</div></div>' +
    '<div class="sc"><div class="sl">Guruhlar</div><div class="sv">12</div><div class="ss">48 jamoa · 3 davlat</div></div>' +
    '<div class="sc"><div class="sl">Top Gol</div><div class="sv">' + (top ? top.goals : '—') + '</div><div class="ss">' + (top ? esc(top.name) : "Hali yo'q") + '</div></div>';
}

function fixtureCard(f, showGroup) {
  var done = f.homeScore !== null;
  var sl = statusLabel(f);
  var stClass = sl[0], stText = sl[1];
  var venue = f.venue ? f.venue.split('(')[0].trim() : '';
  var scoreContent;
  if (done) {
    scoreContent = f.homeScore + ' &mdash; ' + f.awayScore;
  } else if (f.date) {
    scoreContent = '<span class="pend-date">' + fmtDate(f.date) + '</span><span class="pend-time">' + fmtTime(f.time) + '</span>';
  } else {
    scoreContent = '<span class="pend-date">VS</span>';
  }
  // Mobil meta — faqat kichik ekranlarda ko'rinadi
  var mobileMetaStr = '';
  if (f.date) {
    mobileMetaStr = fmtDate(f.date) + (f.time ? ' · ' + fmtTime(f.time) : '');
  }
  if (venue) mobileMetaStr += (mobileMetaStr ? ' · ' : '') + venue;
  return '<div class="fcard" onclick="openDrawer(\'' + f.id + '\')">'
    + '<div class="fmeta">'
    +   '<div class="fdate">' + (f.date ? fmtDate(f.date) : '—') + '</div>'
    +   '<div class="ftime">' + (f.time ? fmtTime(f.time) : '') + '</div>'
    +   '<div class="fvenue">' + esc(venue) + '</div>'
    + '</div>'
    + '<div class="fhome">'
    +   '<span class="team-link" onclick="event.stopPropagation();openTeamDrawer(\'' + esc(f.home).replace(/'/g,'\\\'') + '\')">' + esc(f.home) + '</span>'
    +   flagImg(f.home, 26)
    + '</div>'
    + '<div class="fscore' + (done ? '' : ' pend') + '">'
    +   scoreContent
    + '</div>'
    + '<div class="faway">'
    +   flagImg(f.away, 26)
    +   '<span class="team-link" onclick="event.stopPropagation();openTeamDrawer(\'' + esc(f.away).replace(/'/g,'\\\'') + '\')">' + esc(f.away) + '</span>'
    + '</div>'
    + '<div class="fright">'
    +   (showGroup ? '<span class="grpbadge">Guruh ' + f.group + '</span>' : '')
    +   '<span class="stbadge ' + stClass + '">' + stText + '</span>'
    + '</div>'
    + (mobileMetaStr ? '<div class="fcard-mmeta">' + esc(mobileMetaStr) + '</div>' : '')
    + '</div>';
}

function renderOverviewLists() {
  // Sevimlilar bo'limi
  var favEl = document.getElementById('fav-section');
  if (favEl) favEl.outerHTML = renderFavSection();
  else {
    var favHtml = renderFavSection();
    if (favHtml) document.getElementById('upcoming-list').insertAdjacentHTML('beforebegin', favHtml);
  }

  var upcoming = FIXTURES
    .filter(function(f) { return f.homeScore === null; })
    .sort(function(a,b) {
      var da = a.date || '9999-99-99', db = b.date || '9999-99-99';
      return da.localeCompare(db) || (a.time || '').localeCompare(b.time || '');
    })
    .slice(0, 6);
  document.getElementById('upcoming-list').innerHTML = upcoming.length
    ? upcoming.map(function(f) { return fixtureCard(f, true); }).join('')
    : '<div class="empty"><div class="eic">✅</div>Barcha o\'yinlar o\'ynaldi!</div>';

  var recent = FIXTURES
    .filter(function(f) { return f.homeScore !== null; })
    .sort(function(a,b) { return (b.date || '').localeCompare(a.date || ''); })
    .slice(0, 6);
  document.getElementById('recent-list').innerHTML = recent.length
    ? recent.map(function(f) { return fixtureCard(f, true); }).join('')
    : '<div class="empty"><div class="eic">📅</div>Turnir 11-iyun 2026 boshlanadi</div>';
}

function renderGroups() {
  document.getElementById('ggrid').innerHTML = Object.keys(GROUPS).map(function(g) {
    var st = standings(g);
    var played = FIXTURES.filter(function(f) { return f.group === g && f.homeScore !== null; }).length;
    var rows = st.map(function(t, i) {
      var pc = ['p1','p2','p3','p4'][Math.min(i,3)];
      return '<tr>'
        + '<td style="display:flex;align-items:center;gap:.3rem">'
        +   '<span class="pb ' + pc + '">' + (i+1) + '</span>'
        +   flagImg(t.name, 18)
        +   '<span>' + esc(t.name) + '</span>'
        + '</td>'
        + '<td>' + t.p + '</td><td>' + t.w + '</td><td>' + t.d + '</td><td>' + t.l + '</td>'
        + '<td>' + t.gf + ':' + t.ga + '</td>'
        + '<td>' + (t.gd > 0 ? '+' : '') + t.gd + '</td>'
        + '<td class="pts">' + t.pts + '</td>'
        + '</tr>';
    }).join('');
    return '<div class="gc">'
      + '<div class="gh"><span class="gname">Guruh ' + g + '</span>'
      + '<span style="font-size:.62rem;color:var(--grey);font-family:\'DM Mono\'">' + played + '/6 o\'yin</span></div>'
      + '<table class="gtbl"><thead><tr><th>Jamoa</th><th>O\'</th><th>G</th><th>D</th><th>M</th><th>Gol</th><th>+/-</th><th>Ochko</th></tr></thead>'
      + '<tbody>' + rows + '</tbody></table></div>';
  }).join('');
}

function getAllTeams() {
  var teams = [];
  Object.keys(GROUPS).forEach(function(g) {
    GROUPS[g].teams.forEach(function(t) { if (teams.indexOf(t) < 0) teams.push(t); });
  });
  return teams.sort();
}

function renderTeamDropdown() {
  var sel = document.getElementById('teamfilter');
  if (!sel) return;
  var current = sel.value;
  var teams = getAllTeams();
  sel.innerHTML = '<option value="all">Barcha jamoalar</option>'
    + teams.map(function(t) {
        return '<option value="' + esc(t) + '"' + (tFilter === t ? ' selected' : '') + '>' + t + '</option>';
      }).join('');
}

function renderMatches() {
  // Jamoa dropdown
  renderTeamDropdown();

  // Guruh filtri tugmalari + mobil dropdown
  var letters = ['all'].concat(Object.keys(GROUPS));
  document.getElementById('fbar').innerHTML = letters.map(function(g) {
    return '<button class="fb' + (mFilter === g ? ' act' : '') + '" onclick="setFilter(\'' + g + '\',this)">'
      + (g === 'all' ? 'Barchasi' : 'Guruh ' + g) + '</button>';
  }).join('');
  document.getElementById('fbar-mobile').innerHTML = letters.map(function(g) {
    return '<option value="' + g + '"' + (mFilter === g ? ' selected' : '') + '>'
      + (g === 'all' ? 'Barchasi' : 'Guruh ' + g) + '</option>';
  }).join('');

  // Filtrlash: guruh + jamoa
  var list = FIXTURES;
  if (mFilter !== 'all') list = list.filter(function(f) { return f.group === mFilter; });
  if (tFilter !== 'all') list = list.filter(function(f) { return f.home === tFilter || f.away === tFilter; });
  list = list.slice().sort(function(a,b) {
    var da = a.date || '9999-99-99', db = b.date || '9999-99-99';
    return da.localeCompare(db) || (a.time || '').localeCompare(b.time || '');
  });

  if (!list.length) {
    document.getElementById('allmatches').innerHTML = '<div class="empty"><div class="eic">📅</div>O\'yinlar topilmadi</div>';
    return;
  }

  var byDate = {};
  list.forEach(function(f) {
    var key = f.date || 'TBD';
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push(f);
  });

  var html = '';
  Object.keys(byDate).sort().forEach(function(date) {
    var label = date === 'TBD' ? 'Jadval kutilmoqda' : fmtDateFull(date);
    html += '<div class="date-group">📅 ' + label + '</div>';
    html += byDate[date].map(function(f) { return fixtureCard(f, mFilter === 'all'); }).join('');
  });
  document.getElementById('allmatches').innerHTML = html;
}

function renderScorers() {
  var list = Object.values(allScorers).sort(function(a,b) { return b.goals - a.goals; });
  if (!list.length) {
    document.getElementById('scorer-list').innerHTML =
      '<div class="empty"><div class="eic">⚽</div>Gol ma\'lumotlari turnir boshlanishi bilan ko\'rinadi</div>';
    return;
  }
  document.getElementById('scorer-list').innerHTML = list.map(function(s, i) {
    var rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    return '<div class="scorerrow">'
      + '<div class="srank ' + rankClass + '">' + (i+1) + '</div>'
      + flagImg(s.team, 26)
      + '<div class="sinfo"><div class="sname">' + esc(s.name) + '</div><div class="steam">' + esc(s.team) + '</div></div>'
      + '<div class="sgoals">' + s.goals + '<span>gol</span></div>'
      + '</div>';
  }).join('');
}

function openDrawer(fixId) {
  var f = FIXTURES.find(function(x) { return x.id === fixId; });
  if (!f) return;
  openDrawerId = fixId;
  document.getElementById('drawer-title').textContent = 'Guruh ' + f.group + (f.date ? ' · ' + fmtDate(f.date) : '');
  document.getElementById('drawer-overlay').classList.add('open');
  renderDrawerContent(f);
}

function renderDrawerContent(f) {
  var done = f.homeScore !== null;
  var sl = statusLabel(f);

  // Yarim vaqt hisobi
  var htHtml = '';
  if (done && f.htScore) {
    htHtml = '<div style="text-align:center;font-size:.72rem;color:var(--grey);margin-top:-.5rem;margin-bottom:.75rem">'
      + 'Yarim vaqt: ' + f.htScore[0] + ' — ' + f.htScore[1] + '</div>';
  }

  // Golchilar
  var scorersHtml = '';
  if (done) {
    var allGoals = f.homeScorers.map(function(s) { return {name:s.name,team:f.home,time:s.time,type:s.type,offset:s.offset||0}; })
      .concat(f.awayScorers.map(function(s) { return {name:s.name,team:f.away,time:s.time,type:s.type,offset:s.offset||0}; }))
      .sort(function(a,b) { return parseInt(a.time||0) - parseInt(b.time||0); });

    scorersHtml = '<div class="dsec">⚽ To\'purarlar</div>';
    if (allGoals.length) {
      scorersHtml += allGoals.map(function(g) {
        var minStr = g.time ? g.time + (g.offset ? '+' + g.offset : '') + "'" : '—';
        var typeLabel = '';
        if (g.type === 'Penalty') typeLabel = 'pen.';
        else if (g.type === 'OG') typeLabel = 'o.g.';
        return '<div class="goal-row">'
          + '<span class="goal-min">' + esc(minStr) + '</span>'
          + flagImg(g.team, 18)
          + '<span class="goal-player">' + esc(g.name) + '</span>'
          + '<span class="goal-team">' + esc(g.team) + '</span>'
          + (typeLabel ? '<span class="goal-type">' + typeLabel + '</span>' : '')
          + '</div>';
      }).join('');
    } else {
      scorersHtml += '<div style="font-size:.78rem;color:var(--grey);padding:.5rem 0">Gol ma\'lumoti hali mavjud emas</div>';
    }
  }

  document.getElementById('drawer-body').innerHTML =
    '<div class="dscoreboard">'
    + '<div class="dteam">' + flagImg(f.home, 48) + '<div class="dteam-name">' + esc(f.home) + '</div></div>'
    + '<div class="' + (done ? 'dscore' : 'dscore pend') + '">' + (done ? f.homeScore + ' — ' + f.awayScore : 'VS') + '</div>'
    + '<div class="dteam">' + flagImg(f.away, 48) + '<div class="dteam-name">' + esc(f.away) + '</div></div>'
    + '</div>'
    + htHtml
    + '<div class="dmeta-grid">'
    + '<div class="dmeta-item"><div class="dmeta-label">Sana</div><div class="dmeta-val">' + (f.date ? fmtDate(f.date) : 'Kutilmoqda') + '</div></div>'
    + '<div class="dmeta-item"><div class="dmeta-label">Soat (mahalliy)</div><div class="dmeta-val">' + (f.time ? fmtTime(f.time) : '—') + '</div></div>'
    + '<div class="dmeta-item"><div class="dmeta-label">Stadion</div><div class="dmeta-val">' + esc(f.venue || '—') + '</div></div>'
    + '<div class="dmeta-item"><div class="dmeta-label">Holat</div><div class="dmeta-val"><span class="stbadge ' + sl[0] + '">' + sl[1] + '</span></div></div>'
    + '</div>'
    + scorersHtml;
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  openDrawerId = null;
}

// NAVIGATION
// ═══════════════════════════════════════════════════
function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('act'); });
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('act'); });
  document.getElementById('page-' + page).classList.add('act');
  if (btn) btn.classList.add('act');
  curPage = page;
  if (page === 'groups') renderGroups();
  if (page === 'matches') renderMatches();
  if (page === 'playoff') renderPlayoff();
  if (page === 'scorers') renderScorers();
}

function setFilter(g, btn) {
  mFilter = g;
  document.querySelectorAll('.fb').forEach(function(b) { b.classList.remove('act'); });
  if (btn) btn.classList.add('act');
  renderMatches();
}

function setTeamFilter(team) {
  tFilter = team;
  // Jamoa tanlanganda guruh filtrini avtomatik moslashtirish
  if (team !== 'all') {
    var teamGroup = null;
    Object.keys(GROUPS).forEach(function(g) {
      if (GROUPS[g].teams.indexOf(team) >= 0) teamGroup = g;
    });
    if (teamGroup && mFilter !== 'all' && mFilter !== teamGroup) {
      mFilter = 'all';
    }
  }
  renderMatches();
}

function showToast(msg, err) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (err ? ' err' : '');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}

document.getElementById('drawer-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeDrawer();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDrawer();
});

// KNOCKOUT / PLAYOFF
// ═══════════════════════════════════════════════════
var KNOCKOUTS = [];
var ROUND_ORDER = ['Round of 32','Round of 16','Quarter-final','Semi-final','Match for third place','Final'];
var ROUND_LABELS = {'Round of 32':'32 lik bosqich','Round of 16':'16 lik bosqich','Quarter-final':'Chorak final','Semi-final':'Yarim final','Match for third place':'3-o\'rin uchun','Final':'FINAL'};

function renderPlayoff() {
  if (!KNOCKOUTS.length) {
    document.getElementById('playoff-content').innerHTML =
      '<div class="empty"><div class="eic">🏆</div>Playoff jadvali turnir davomida paydo bo\'ladi</div>';
    return;
  }
  var byRound = {};
  KNOCKOUTS.forEach(function(k) {
    if (!byRound[k.round]) byRound[k.round] = [];
    byRound[k.round].push(k);
  });
  var html = '';
  ROUND_ORDER.forEach(function(r) {
    if (!byRound[r]) return;
    var games = byRound[r];
    html += '<div class="bracket-round">'
      + '<div class="bracket-title">' + (ROUND_LABELS[r] || r) + '</div>'
      + '<div class="bracket-games">';
    games.forEach(function(k) {
      var hasScore = k.score && k.score.ft;
      var t1 = k.team1 || '?';
      var t2 = k.team2 || '?';
      var scoreStr = hasScore ? k.score.ft[0] + ' — ' + k.score.ft[1] : 'VS';
      html += '<div class="ko-card">'
        + '<div class="ko-teams">'
        +   flagImg(t1, 20) + ' <span>' + esc(t1) + '</span>'
        +   '<span class="ko-vs">vs</span>'
        +   flagImg(t2, 20) + ' <span>' + esc(t2) + '</span>'
        +   '<span class="ko-score">' + scoreStr + '</span>'
        + '</div>'
        + '<div class="ko-meta">'
        +   (k.date ? '<span>' + fmtDate(k.date) + '</span>' : '')
        +   (k.time ? '<span>' + fmtTime(k.time) + '</span>' : '')
        +   (k.venue ? '<span>' + esc(k.venue) + '</span>' : '')
        + '</div>'
        + '</div>';
    });
    html += '</div></div>';
  });
  document.getElementById('playoff-content').innerHTML = html;
}

// ═══════════════════════════════════════════════════
// TEAM DRAWER
// ═══════════════════════════════════════════════════
function openTeamDrawer(teamName) {
  openDrawerId = 'team-' + teamName;
  document.getElementById('drawer-title').textContent = teamName;
  document.getElementById('drawer-overlay').classList.add('open');
  // Jamoa guruhini topish
  var teamGroup = null;
  Object.keys(GROUPS).forEach(function(g) {
    if (GROUPS[g].teams.indexOf(teamName) >= 0) teamGroup = g;
  });
  // Jamoa o'yinlarini olish
  var teamFixtures = FIXTURES.filter(function(f) { return f.home === teamName || f.away === teamName; });
  // Statistika
  var st = {p:0,w:0,d:0,l:0,gf:0,ga:0};
  teamFixtures.forEach(function(f) {
    if (f.homeScore === null) return;
    st.p++;
    var isHome = f.home === teamName;
    var gf = isHome ? f.homeScore : f.awayScore;
    var ga = isHome ? f.awayScore : f.homeScore;
    st.gf += gf; st.ga += ga;
    if (gf > ga) st.w++;
    else if (gf < ga) st.l++;
    else st.d++;
  });
  // Guruh o'rni
  var pos = '—';
  if (teamGroup) {
    var stand = standings(teamGroup);
    for (var i = 0; i < stand.length; i++) {
      if (stand[i].name === teamName) { pos = (i+1) + '-o\'rin'; break; }
    }
  }
  // Jamoa golchilari
  var teamScorers = [];
  teamFixtures.forEach(function(f) {
    var scorers = f.home === teamName ? f.homeScorers : f.awayScorers;
    scorers.forEach(function(s) {
      if (s.type === 'OG') return;
      var existing = teamScorers.find(function(x) { return x.name === s.name; });
      if (existing) existing.goals++;
      else teamScorers.push({name: s.name, goals: 1});
    });
  });
  teamScorers.sort(function(a,b) { return b.goals - a.goals; });
  // Render
  var favClass = favorites.indexOf(teamName) >= 0 ? ' active' : '';
  var html = '<div style="text-align:center;margin-bottom:.75rem">'
    + flagImg(teamName, 56)
    + '<div style="font-weight:700;font-size:1.1rem;margin-top:.4rem">' + esc(teamName)
    + ' <span class="fav-star' + favClass + '" onclick="toggleFavorite(\'' + esc(teamName).replace(/'/g,'\\\'') + '\',this)">★</span></div>'
    + (teamGroup ? '<div style="font-size:.72rem;color:var(--grey)">Guruh ' + teamGroup + ' · ' + pos + '</div>' : '')
    + '</div>';
  html += '<div class="td-stats">'
    + '<div class="td-stat"><div class="td-stat-val">' + st.p + '</div><div class="td-stat-lbl">O\'yin</div></div>'
    + '<div class="td-stat"><div class="td-stat-val">' + st.w + '-' + st.d + '-' + st.l + '</div><div class="td-stat-lbl">G / D / M</div></div>'
    + '<div class="td-stat"><div class="td-stat-val">' + st.gf + ':' + st.ga + '</div><div class="td-stat-lbl">Gol</div></div>'
    + '</div>';
  // O'yinlar ro'yxati
  html += '<div class="dsec">📋 O\'yinlar</div>';
  teamFixtures.sort(function(a,b) {
    var da = a.date || '9999', db = b.date || '9999';
    return da.localeCompare(db);
  }).forEach(function(f) {
    var isHome = f.home === teamName;
    var opponent = isHome ? f.away : f.home;
    var scoreStr = f.homeScore !== null
      ? (isHome ? f.homeScore + ' — ' + f.awayScore : f.awayScore + ' — ' + f.homeScore)
      : 'VS';
    html += '<div class="td-match">'
      + flagImg(opponent, 18)
      + '<span>' + (isHome ? 'vs ' : '@ ') + esc(opponent) + '</span>'
      + '<span class="td-match-score">' + scoreStr + '</span>'
      + '<span class="td-match-date">' + (f.date ? fmtDate(f.date) : '—') + '</span>'
      + '</div>';
  });
  // Golchilar
  if (teamScorers.length) {
    html += '<div class="dsec">⚽ Golchilar</div>';
    teamScorers.forEach(function(s) {
      html += '<div class="goal-row"><span class="goal-player">' + esc(s.name) + '</span><span class="goal-min">' + s.goals + ' gol</span></div>';
    });
  }
  document.getElementById('drawer-body').innerHTML = html;
}

// ═══════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════
function performSearch(query) {
  var container = document.getElementById('search-results');
  if (!query || query.length < 2) { container.classList.remove('open'); return; }
  var q = query.toLowerCase();
  var results = [];
  // Jamoalar
  getAllTeams().forEach(function(t) {
    if (t.toLowerCase().indexOf(q) >= 0) results.push({type: 'Jamoa', name: t, action: 'team'});
  });
  // Stadionlar
  var venues = {};
  FIXTURES.forEach(function(f) { if (f.venue && f.venue.toLowerCase().indexOf(q) >= 0) venues[f.venue] = f.id; });
  Object.keys(venues).forEach(function(v) {
    results.push({type: 'Stadion', name: v, action: 'match', id: venues[v]});
  });
  // Guruhlar
  Object.keys(GROUPS).forEach(function(g) {
    if (('guruh ' + g).toLowerCase().indexOf(q) >= 0) results.push({type: 'Guruh', name: 'Guruh ' + g, action: 'group', group: g});
  });
  if (!results.length) { container.classList.remove('open'); return; }
  container.innerHTML = results.slice(0, 8).map(function(r, i) {
    var onclick = '';
    if (r.action === 'team') onclick = 'searchSelect(\'team\',\'' + esc(r.name).replace(/'/g,'\\\'') + '\')';
    else if (r.action === 'match') onclick = 'searchSelect(\'match\',\'' + r.id + '\')';
    else if (r.action === 'group') onclick = 'searchSelect(\'group\',\'' + r.group + '\')';
    return '<div class="search-item" onclick="' + onclick + '">'
      + (r.action === 'team' ? flagImg(r.name, 18) : '')
      + '<span>' + esc(r.name) + '</span>'
      + '<span class="si-type">' + r.type + '</span></div>';
  }).join('');
  container.classList.add('open');
}

function searchSelect(type, val) {
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').classList.remove('open');
  if (type === 'team') {
    openTeamDrawer(val);
  } else if (type === 'match') {
    openDrawer(val);
  } else if (type === 'group') {
    showPage('groups', document.querySelectorAll('nav button')[1]);
  }
}

// Tashqarida bosilganda search yopilsin
document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('search-results').classList.remove('open');
  }
});

// ═══════════════════════════════════════════════════
// FAVORITES
// ═══════════════════════════════════════════════════
var favorites = JSON.parse(localStorage.getItem('fifa2026_fav') || '[]');

function toggleFavorite(team, el) {
  var idx = favorites.indexOf(team);
  if (idx >= 0) { favorites.splice(idx, 1); if (el) el.classList.remove('active'); }
  else { favorites.push(team); if (el) el.classList.add('active'); }
  localStorage.setItem('fifa2026_fav', JSON.stringify(favorites));
  if (curPage === 'overview') renderOverviewLists();
}

function renderFavSection() {
  if (!favorites.length) return '';
  var favFixtures = FIXTURES.filter(function(f) {
    return favorites.indexOf(f.home) >= 0 || favorites.indexOf(f.away) >= 0;
  }).filter(function(f) { return f.homeScore === null; })
    .sort(function(a,b) {
      var da = a.date || '9999', db = b.date || '9999';
      return da.localeCompare(db);
    }).slice(0, 4);
  if (!favFixtures.length) return '';
  return '<div id="fav-section" class="fav-sec"><div class="sec" style="font-size:1.2rem">★ Sevimlilar</div>'
    + '<div class="mlist">'
    + favFixtures.map(function(f) { return fixtureCard(f, true); }).join('')
    + '</div></div>';
}

// ═══════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════
function initTheme() {
  var saved = localStorage.getItem('fifa2026_theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-btn').textContent = '☀️';
  }
}

function toggleTheme() {
  var isLight = document.body.classList.toggle('light');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('fifa2026_theme', isLight ? 'light' : 'dark');
}

renderAll();
