<!DOCTYPE html>
<html lang="uz">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <?!= include('Stylesheet'); ?>
</head>
<body>
  <div id="watermark" aria-hidden="true"></div>

  <!-- Kirish oynasi -->
  <section id="view-login" class="view">
    <div class="login-card">
      <h1>Mijozlar CRM</h1>
      <p class="muted">Tizimga kirish uchun login va parolingizni kiriting</p>
      <form id="login-form" autocomplete="off">
        <label>Login
          <input type="text" id="login-username" autocomplete="username" autocapitalize="none" required>
        </label>
        <label>Parol
          <input type="password" id="login-password" autocomplete="current-password" required>
        </label>
        <button type="submit" id="login-btn" class="primary">Kirish</button>
        <div id="login-error" class="error" role="alert"></div>
      </form>
    </div>
  </section>

  <!-- Asosiy ilova -->
  <section id="view-app" class="view hidden">
    <header class="topbar">
      <div class="who">
        <strong id="user-name"></strong>
        <span id="quota" class="muted"></span>
      </div>
      <button id="logout-btn" class="ghost">Chiqish</button>
    </header>

    <div class="controls">
      <input type="search" id="search-input" placeholder="Mijoz nomi bo&#39;yicha qidirish...">
      <div class="filters">
        <select id="filter-viloyat"><option value="">Barcha viloyatlar</option></select>
        <select id="filter-brand"><option value="">Barcha brendlar</option></select>
      </div>
    </div>

    <div id="status-line" class="muted"></div>
    <div id="results"></div>

    <div class="pager">
      <button id="prev-btn" class="ghost" disabled>&#8592; Oldingi</button>
      <button id="next-btn" class="ghost" disabled>Keyingi &#8594;</button>
    </div>
  </section>

  <!-- Mijoz kartasi (modal) -->
  <div id="detail-overlay" class="overlay hidden">
    <div class="detail-card" role="dialog" aria-modal="true">
      <button id="detail-close" class="close" aria-label="Yopish">&times;</button>
      <h2 id="d-mijoz"></h2>
      <p id="d-meta" class="muted"></p>

      <div id="d-contacts"></div>

      <h3>Suhbat xulosasini yozish</h3>
      <form id="note-form">
        <label>Kim bilan gaplashdingiz?
          <select id="note-with">
            <option>Rahbar</option>
            <option>Menejment</option>
            <option>Boshqa</option>
          </select>
        </label>
        <textarea id="note-text" maxlength="500" rows="3"
          placeholder="Qisqacha xulosa: nima kelishildi, keyingi qadam..."></textarea>
        <button type="submit" class="primary">Saqlash</button>
      </form>

      <h3>Oxirgi izohlar</h3>
      <div id="notes-list"></div>
    </div>
  </div>

  <div id="toast" class="hidden"></div>

  <?!= include('JavaScript'); ?>
</body>
</html>
