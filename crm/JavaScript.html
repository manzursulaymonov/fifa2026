<script>
(function () {
  'use strict';

  var state = {
    token: sessionStorage.getItem('crmToken') || '',
    username: '',
    fullName: '',
    page: 0,
    hasMore: false,
    currentCustomerId: '',
    searchTimer: null
  };

  function $(id) { return document.getElementById(id); }

  /* ---------- Server bilan aloqa ---------- */

  function run(fn) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function (resolve, reject) {
      var runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject);
      runner[fn].apply(runner, args);
    });
  }

  // Himoyalangan chaqiruv: token avtomatik qo'shiladi,
  // sessiya tugagan bo'lsa login oynasiga qaytariladi.
  function api(fn) {
    var rest = Array.prototype.slice.call(arguments, 1);
    return run.apply(null, [fn, state.token].concat(rest)).catch(function (err) {
      var msg = String((err && err.message) || err);
      if (msg.indexOf('SESSION_EXPIRED') !== -1) {
        clearSession();
        showLogin('Sessiya tugadi, qaytadan kiring');
      }
      throw err;
    });
  }

  /* ---------- Ko'rinishlar ---------- */

  function showLogin(message) {
    $('view-app').classList.add('hidden');
    $('view-login').classList.remove('hidden');
    closeDetail();
    $('login-error').textContent = message || '';
    buildWatermark();
  }

  function showApp() {
    $('view-login').classList.add('hidden');
    $('view-app').classList.remove('hidden');
    $('user-name').textContent = state.fullName || state.username;
    buildWatermark();
  }

  function clearSession() {
    state.token = '';
    state.username = '';
    state.fullName = '';
    sessionStorage.removeItem('crmToken');
  }

  function setStats(stats) {
    if (!stats) return;
    $('quota').textContent = 'Bugungi limit: ' + stats.remainingToday + '/' + stats.detailLimit + ' ta karta';
  }

  function refreshStats() {
    api('getMyStats').then(function (s) { if (s.ok) setStats(s.stats); }).catch(function () {});
  }

  function toast(message) {
    var el = $('toast');
    el.textContent = message;
    el.classList.remove('hidden');
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { el.classList.add('hidden'); }, 2600);
  }

  /* ---------- Kirish / chiqish ---------- */

  $('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var btn = $('login-btn');
    btn.disabled = true;
    $('login-error').textContent = '';
    run('login', $('login-username').value, $('login-password').value)
      .then(function (res) {
        btn.disabled = false;
        if (!res.ok) {
          $('login-error').textContent = res.error || 'Xatolik yuz berdi';
          return;
        }
        state.token = res.token;
        state.username = res.username;
        state.fullName = res.fullName;
        sessionStorage.setItem('crmToken', res.token);
        $('login-password').value = '';
        setStats(res.stats);
        showApp();
        loadFilters();
        doSearch(0);
      })
      .catch(function () {
        btn.disabled = false;
        $('login-error').textContent = 'Server bilan aloqa xatosi. Qayta urinib ko‘ring.';
      });
  });

  $('logout-btn').addEventListener('click', function () {
    var t = state.token;
    clearSession();
    showLogin('');
    if (t) run('logout', t).catch(function () {});
  });

  /* ---------- Filtrlar va qidiruv ---------- */

  function loadFilters() {
    api('getFilters').then(function (res) {
      if (!res.ok) return;
      fillSelect($('filter-viloyat'), res.viloyatlar, 'Barcha viloyatlar');
      fillSelect($('filter-brand'), res.brandlar, 'Barcha brendlar');
    }).catch(function () {});
  }

  function fillSelect(select, values, emptyLabel) {
    var current = select.value;
    while (select.firstChild) select.removeChild(select.firstChild);
    var first = document.createElement('option');
    first.value = '';
    first.textContent = emptyLabel;
    select.appendChild(first);
    values.forEach(function (v) {
      var opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v;
      select.appendChild(opt);
    });
    select.value = current;
  }

  $('search-input').addEventListener('input', function () {
    clearTimeout(state.searchTimer);
    state.searchTimer = setTimeout(function () { doSearch(0); }, 400);
  });
  $('filter-viloyat').addEventListener('change', function () { doSearch(0); });
  $('filter-brand').addEventListener('change', function () { doSearch(0); });
  $('prev-btn').addEventListener('click', function () { doSearch(state.page - 1); });
  $('next-btn').addEventListener('click', function () { doSearch(state.page + 1); });

  function doSearch(page) {
    if (page < 0) page = 0;
    $('status-line').textContent = 'Qidirilmoqda...';
    $('prev-btn').disabled = true;
    $('next-btn').disabled = true;
    api('searchCustomers',
        $('search-input').value,
        $('filter-viloyat').value,
        $('filter-brand').value,
        page)
      .then(function (res) {
        if (!res.ok) {
          if (res.error === 'THROTTLE') {
            $('status-line').textContent = 'Juda tez-tez qidiryapsiz. Bir daqiqa kutib turing.';
          } else {
            $('status-line').textContent = 'Xatolik yuz berdi.';
          }
          return;
        }
        state.page = res.page;
        state.hasMore = res.hasMore;
        renderResults(res.rows);
        $('prev-btn').disabled = res.page === 0;
        $('next-btn').disabled = !res.hasMore;
        $('status-line').textContent = res.rows.length
          ? (res.page + 1) + '-sahifa'
          : 'Hech narsa topilmadi';
      })
      .catch(function () {
        $('status-line').textContent = 'Server bilan aloqa xatosi.';
      });
  }

  function renderResults(rows) {
    var box = $('results');
    while (box.firstChild) box.removeChild(box.firstChild);
    rows.forEach(function (r) {
      var row = document.createElement('div');
      row.className = 'cust-row';

      var info = document.createElement('div');
      info.className = 'info';
      var name = document.createElement('div');
      name.className = 'name';
      name.textContent = r.mijoz;
      var sub = document.createElement('div');
      sub.className = 'sub';
      sub.textContent = [r.brand, r.viloyat, r.tuman, r.davlat]
        .filter(function (x) { return x; })
        .join(' · ');
      info.appendChild(name);
      info.appendChild(sub);

      var btn = document.createElement('button');
      btn.className = 'primary';
      btn.style.width = 'auto';
      btn.textContent = 'Ko‘rish';
      btn.addEventListener('click', function () { openDetail(r.id); });

      row.appendChild(info);
      row.appendChild(btn);
      box.appendChild(row);
    });
  }

  /* ---------- Mijoz kartasi ---------- */

  function telHref(raw) {
    var digits = String(raw).replace(/\D/g, '');
    if (!digits) return '';
    if (digits.length === 9) digits = '998' + digits; // mahalliy format
    return 'tel:+' + digits;
  }

  // Bitta katakda "904555555, 939900000" kabi bir nechta raqam bo'lishi mumkin
  function splitPhones(raw) {
    return String(raw || '')
      .split(/[,;]+/)
      .map(function (s) { return s.trim(); })
      .filter(function (s) { return s; });
  }

  function contactBlock(role, person, phonesRaw) {
    var box = document.createElement('div');
    box.className = 'contact';

    var roleEl = document.createElement('div');
    roleEl.className = 'role';
    roleEl.textContent = role;
    box.appendChild(roleEl);

    var personEl = document.createElement('div');
    personEl.className = 'person';
    personEl.textContent = person || '—';
    box.appendChild(personEl);

    var phones = splitPhones(phonesRaw);
    if (phones.length) {
      phones.forEach(function (p) {
        var a = document.createElement('a');
        a.className = 'phone';
        a.textContent = p;
        var href = telHref(p);
        if (href) a.href = href;
        box.appendChild(a);
      });
    } else {
      var none = document.createElement('span');
      none.className = 'none';
      none.textContent = 'raqam ko‘rsatilmagan';
      box.appendChild(none);
    }
    return box;
  }

  function openDetail(customerId) {
    api('getCustomerDetails', customerId)
      .then(function (res) {
        if (!res.ok) {
          if (res.error === 'LIMIT') {
            toast('Bugungi ko‘rish limitingiz tugadi. Ertaga davom etasiz.');
            refreshStats();
          } else {
            toast('Mijoz topilmadi');
          }
          return;
        }
        var c = res.customer;
        state.currentCustomerId = c.id;

        $('d-mijoz').textContent = c.mijoz;
        $('d-meta').textContent = [c.brand, c.viloyat, c.tuman, c.davlat]
          .filter(function (x) { return x; })
          .join(' · ');

        var contacts = $('d-contacts');
        while (contacts.firstChild) contacts.removeChild(contacts.firstChild);
        contacts.appendChild(contactBlock('Rahbar', c.rahbar, c.nomer));
        contacts.appendChild(contactBlock('Menejment', c.menejment, c.nomeri));

        renderNotes(res.notes);
        $('note-text').value = '';
        refreshStats();

        $('detail-overlay').classList.remove('hidden');
      })
      .catch(function () { toast('Server bilan aloqa xatosi'); });
  }

  function renderNotes(notes) {
    var list = $('notes-list');
    while (list.firstChild) list.removeChild(list.firstChild);
    if (!notes || !notes.length) {
      var empty = document.createElement('p');
      empty.className = 'muted';
      empty.textContent = 'Hali izoh yo‘q';
      list.appendChild(empty);
      return;
    }
    notes.forEach(function (n) { list.appendChild(noteItem(n)); });
  }

  function noteItem(n) {
    var item = document.createElement('div');
    item.className = 'note-item';
    var meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = n.vaqt + ' · ' + n.username + ' · ' + n.kim;
    var text = document.createElement('div');
    text.className = 'text';
    text.textContent = n.matn;
    item.appendChild(meta);
    item.appendChild(text);
    return item;
  }

  function closeDetail() {
    state.currentCustomerId = '';
    $('detail-overlay').classList.add('hidden');
    // Telefon raqamlari DOMda qolmasin
    var contacts = $('d-contacts');
    while (contacts.firstChild) contacts.removeChild(contacts.firstChild);
    $('d-mijoz').textContent = '';
    $('d-meta').textContent = '';
    var list = $('notes-list');
    while (list.firstChild) list.removeChild(list.firstChild);
  }

  $('detail-close').addEventListener('click', closeDetail);
  $('detail-overlay').addEventListener('click', function (e) {
    if (e.target === this) closeDetail();
  });

  /* ---------- Izoh yozish ---------- */

  $('note-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var text = $('note-text').value.trim();
    if (!text) { toast('Xulosa matnini yozing'); return; }
    if (!state.currentCustomerId) return;
    var btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;
    api('addNote', state.currentCustomerId, $('note-with').value, text)
      .then(function (res) {
        btn.disabled = false;
        if (!res.ok) {
          toast(res.error === 'TOO_LONG' ? 'Izoh juda uzun (maksimum 500 belgi)' : 'Saqlab bo‘lmadi');
          return;
        }
        $('note-text').value = '';
        toast('Saqlandi ✓');
        var list = $('notes-list');
        var firstNote = list.querySelector('.note-item');
        var emptyMsg = list.querySelector('p');
        if (emptyMsg) list.removeChild(emptyMsg);
        list.insertBefore(noteItem(res.note), firstNote || null);
      })
      .catch(function () {
        btn.disabled = false;
        toast('Server bilan aloqa xatosi');
      });
  });

  /* ---------- Watermark ---------- */

  function buildWatermark() {
    var wm = $('watermark');
    while (wm.firstChild) wm.removeChild(wm.firstChild);
    if (!state.username) return;
    var stamp = new Date();
    var label = state.username + ' · ' +
      stamp.getFullYear() + '-' + pad(stamp.getMonth() + 1) + '-' + pad(stamp.getDate()) +
      ' ' + pad(stamp.getHours()) + ':' + pad(stamp.getMinutes());
    for (var i = 0; i < 60; i++) {
      var s = document.createElement('span');
      s.textContent = label;
      wm.appendChild(s);
    }
  }
  function pad(n) { return (n < 10 ? '0' : '') + n; }
  setInterval(buildWatermark, 60000);

  /* ---------- Nusxalashga qarshi to'siqlar ---------- */

  ['contextmenu', 'copy', 'cut', 'dragstart', 'selectstart'].forEach(function (ev) {
    document.addEventListener(ev, function (e) {
      var tag = e.target && e.target.tagName;
      if ((tag === 'INPUT' || tag === 'TEXTAREA') && ev !== 'contextmenu') return;
      e.preventDefault();
    });
  });

  document.addEventListener('keydown', function (e) {
    if (!(e.ctrlKey || e.metaKey)) return;
    var k = (e.key || '').toLowerCase();
    if (k === 'p' || k === 's') { e.preventDefault(); return; }
    if (k === 'c' || k === 'x' || k === 'a') {
      var tag = document.activeElement && document.activeElement.tagName;
      if (tag !== 'INPUT' && tag !== 'TEXTAREA') e.preventDefault();
    }
  });

  window.addEventListener('beforeprint', function () {
    document.body.style.visibility = 'hidden';
  });
  window.addEventListener('afterprint', function () {
    document.body.style.visibility = '';
  });

  /* ---------- Ishga tushirish ---------- */

  if (state.token) {
    run('checkSession', state.token)
      .then(function (res) {
        if (res.ok) {
          state.username = res.username;
          state.fullName = res.fullName;
          setStats(res.stats);
          showApp();
          loadFilters();
          doSearch(0);
        } else {
          clearSession();
          showLogin('');
        }
      })
      .catch(function () { showLogin(''); });
  } else {
    showLogin('');
  }
})();
</script>
