<style>
  :root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #1c2430;
    --muted: #6b7585;
    --accent: #1565c0;
    --accent-dark: #0d47a1;
    --danger: #c62828;
    --border: #dde3ec;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  /* Nusxalashga qarshi: matn belgilash o'chirilgan (formalar bundan mustasno) */
  body, body * {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  input, textarea {
    -webkit-user-select: text;
    user-select: text;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .hidden { display: none !important; }
  .muted { color: var(--muted); font-size: 0.9em; }
  .error { color: var(--danger); min-height: 1.2em; margin-top: 8px; font-size: 0.92em; }

  /* Watermark — har doim eng ustida, bosishga xalaqit bermaydi */
  #watermark {
    position: fixed;
    inset: -20%;
    z-index: 9999;
    pointer-events: none;
    display: flex;
    flex-wrap: wrap;
    gap: 48px;
    align-content: space-around;
    justify-content: space-around;
    transform: rotate(-24deg);
    opacity: 0.07;
  }
  #watermark span {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    color: #000;
  }

  /* Kirish oynasi */
  #view-login {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }
  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 30px rgba(20, 40, 80, 0.08);
  }
  .login-card h1 { margin: 0 0 4px; font-size: 1.5em; }
  .login-card p { margin: 0 0 20px; }
  .login-card label { display: block; margin-bottom: 14px; font-size: 0.92em; font-weight: 600; }
  .login-card input {
    display: block;
    width: 100%;
    margin-top: 6px;
    padding: 10px 12px;
    font-size: 1em;
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  button {
    font: inherit;
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid transparent;
    padding: 10px 16px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  button.primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    font-weight: 600;
  }
  button.primary:hover:not(:disabled) { background: var(--accent-dark); }
  button.ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--text);
  }

  /* Asosiy ilova */
  #view-app { max-width: 760px; margin: 0 auto; padding: 12px 14px 40px; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
  }
  .who { display: flex; flex-direction: column; }

  .controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .controls input[type="search"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 1em;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .filters { display: flex; gap: 8px; }
  .filters select {
    flex: 1;
    padding: 9px 10px;
    font-size: 0.95em;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    min-width: 0;
  }

  #status-line { margin: 4px 2px 8px; min-height: 1.2em; }

  /* Natijalar ro'yxati */
  .cust-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .cust-row .info { min-width: 0; }
  .cust-row .name { font-weight: 600; }
  .cust-row .sub { font-size: 0.85em; color: var(--muted); margin-top: 2px; }
  .cust-row button { white-space: nowrap; }

  .pager { display: flex; justify-content: space-between; margin-top: 12px; }

  /* Mijoz kartasi (modal) */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 25, 40, 0.55);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .detail-card {
    background: var(--card);
    border-radius: 14px 14px 0 0;
    width: 100%;
    max-width: 560px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 20px 18px 28px;
    position: relative;
  }
  @media (min-width: 600px) {
    .overlay { align-items: center; padding: 20px; }
    .detail-card { border-radius: 14px; }
  }
  .detail-card h2 { margin: 0 36px 4px 0; }
  .detail-card h3 { margin: 20px 0 8px; font-size: 1em; }
  .close {
    position: absolute;
    top: 10px;
    right: 10px;
    background: transparent;
    border: none;
    font-size: 1.6em;
    line-height: 1;
    color: var(--muted);
    padding: 6px 10px;
  }

  .contact {
    background: #f0f5fc;
    border: 1px solid #d7e4f5;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .contact .role { font-size: 0.8em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .contact .person { font-weight: 600; margin: 2px 0 4px; }
  .contact a.phone {
    display: inline-block;
    margin: 2px 10px 2px 0;
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
    font-size: 1.05em;
  }
  .contact .none { color: var(--muted); font-style: italic; }

  #note-form label { display: block; font-size: 0.9em; font-weight: 600; margin-bottom: 8px; }
  #note-form select {
    display: block;
    margin-top: 6px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    font-size: 0.95em;
  }
  #note-form textarea {
    width: 100%;
    padding: 10px 12px;
    font: inherit;
    border: 1px solid var(--border);
    border-radius: 8px;
    resize: vertical;
    margin-bottom: 8px;
  }

  .note-item {
    border-left: 3px solid var(--border);
    padding: 6px 10px;
    margin-bottom: 8px;
  }
  .note-item .meta { font-size: 0.8em; color: var(--muted); }
  .note-item .text { margin-top: 2px; white-space: pre-wrap; }

  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #2e3b4e;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    z-index: 200;
    font-size: 0.95em;
    max-width: 90vw;
  }

  /* Chop etish butunlay bloklangan */
  @media print {
    body * { display: none !important; }
    body::before {
      content: "Chop etish taqiqlangan";
      display: block;
      padding: 40px;
      font-size: 24px;
    }
  }
</style>
